<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Mesures – dernière semaine</title>

  <style>
    body { font-family: Arial, sans-serif; margin: 30px; }
    h1, h2 { color: #2c7; }
    select, button {
      padding: 8px;
      font-size: 15px;
      margin: 6px 0;
    }
    #deviceBox {
      border: 1px solid #ccc;
      padding: 15px;
      border-radius: 6px;
      max-width: 420px;
      margin-bottom: 20px;
    }
    .status { font-weight: bold; margin-top: 10px; }
  </style>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<h1>📈 Mesures – dernière semaine</h1>

<div id="deviceBox">
  <h2>Modules</h2>
  <select id="deviceSelect"></select>
  <br>
  <button onclick="loadCurve()">Afficher la courbe</button>
  <div id="status" class="status"></div>
</div>

<div style="max-width:900px">
  <canvas id="chart"></canvas>
</div>

<script>
/* ================= CONFIG ================= */
const SUPABASE_URL = "https://pbciwmsuhaniokugzqhr.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBiY2l3bXN1aGFuaW9rdWd6cWhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MjAwNjYsImV4cCI6MjA5MDE5NjA2Nn0.Fl1-yezxVeatTaIJlUvAKG1X9PhIlworqZ-6vxDyAmo";
const USER_ID = "8aec257d-e395-4463-b828-370704f3d145";

const supabaseClient = supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

let chart = null;

/* ================= MODULES ================= */
async function loadDevices() {
  const { data, error } = await supabaseClient
    .from("devices")
    .select("device_uid, name")
    .eq("user_id", USER_ID)
    .order("created_at");

  if (error) {
    console.error(error);
    status.textContent = "❌ Erreur chargement modules";
    return;
  }

  deviceSelect.innerHTML = "";
  data.forEach(d => {
    const opt = document.createElement("option");
    opt.value = d.device_uid;
    opt.textContent = d.name || d.device_uid;
    deviceSelect.appendChild(opt);
  });
}

/* ================= COURBE (7 JOURS) ================= */
async function loadCurve() {
  const deviceUid = deviceSelect.value;
  if (!deviceUid) return;

  status.textContent = "Chargement…";

  const since = new Date(
    Date.now() - 7 * 24 * 60 * 60 * 1000
  ).toISOString();

  const { data: mesures, error } = await supabaseClient
    .from("mesures")
    .select("timestamp, humidity")
    .eq("device_uid", deviceUid)
    .gte("timestamp", since)
    .order("timestamp");

  if (error) {
    console.error(error);
    status.textContent = "❌ Erreur chargement données";
    return;
  }

  const points = mesures.map(m => ({
    x: new Date(m.timestamp),
    y: m.humidity
  }));

  if (chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type: "line",
    data: {
      datasets: [{
        label: "Humidité (%) – 7 derniers jours",
        data: points,
        borderColor: "#2c7",
        tension: 0.2
      }]
    },
    options: {
      responsive: true,
      scales: {
        x: { type: "time" },
        y: { min: 0, max: 100 }
      }
    }
  });

  status.textContent =
    points.length ? "✅ Courbe affichée" : "⚠️ Aucune donnée";
}

/* ================= INIT ================= */
loadDevices();
</script>

</body>
</html>

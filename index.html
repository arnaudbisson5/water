<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Plant Curve</title>

<style>
  body { font-family: Arial; margin: 30px; }
  h1 { color: #2c7; }

  input, button, select {
    padding: 10px;
    font-size: 16px;
    margin-top: 10px;
    margin-right: 5px;
  }

  #loginBox {
    border: 2px solid #ccc;
    padding: 20px;
    max-width: 400px;
    border-radius: 10px;
    margin-bottom: 30px;
  }

  #dashboard { display: none; }
  #chartContainer { max-width: 900px; margin-top: 40px; }
  #status { margin-top: 20px; font-weight: bold; }
</style>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>
<body>

<h1>🌱 Courbe humidité + seuil + arrosages</h1>

<!-- ✅ LOGIN -->
<div id="loginBox">
  <h2>Connexion</h2>
  <p>Entrez votre email pour recevoir un lien magique :</p>

  <input id="emailInput" type="email" placeholder="email@example.com" style="width:90%">
  <br>
  <button onclick="login()">Se connecter</button>

  <p id="loginStatus"></p>
</div>

<!-- ✅ DASHBOARD -->
<div id="dashboard">


<h2>Ajouter un module</h2>

<input
  id="deviceUidInput"
  placeholder="Identifiant du module (ex: ESP32-001)"
>

<input
  id="deviceNameInput"
  placeholder="Nom du module (ex: Basilic salon)"
>

<button onclick="createDevice()">Créer le module</button>

<p id="deviceStatus"></p>

  
  <p><strong>Device ID :</strong></p>
  <input id="deviceIdInput" value="B483A21F8A3C">

  <br><br>
  <button onclick="loadCurve()">Afficher la courbe</button>
  <button onclick="sendWaterCommand()">💧 Arroser maintenant</button>
  <button onclick="logout()">🚪 Déconnexion</button>

  <div id="status"></div>

  <div id="chartContainer">
    <canvas id="chart"></canvas>
  </div>
</div>

<script>
// ----------------------------------------------------------------
// CONFIG SUPABASE
// ----------------------------------------------------------------
const SUPABASE_URL = "https://pbciwmsuhaniokugzqhr.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBiY2l3bXN1aGFuaW9rdWd6cWhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MjAwNjYsImV4cCI6MjA5MDE5NjA2Nn0.Fl1-yezxVeatTaIJlUvAKG1X9PhIlworqZ-6vxDyAmo"; // garde la tienne

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let chart = null;
// ----------------------------------------------------------------
// CRÉATION D'UN MODULE (devices)
// ----------------------------------------------------------------
async function createDevice() {
  console.log("createDevice appelée");
  const status = document.getElementById("deviceStatus");
  status.textContent = "";

  // 1. Récupérer l'utilisateur connecté
  const { data, error } = await supabaseClient.auth.getUser();

  if (error || !data || !data.user) {
    status.textContent = "Utilisateur non connecté.";
    return;
  }

  const userId = data.user.id;

  // 2. Lire les champs du formulaire
  const deviceUid =
    document.getElementById("deviceUidInput").value.trim();
  const deviceName =
    document.getElementById("deviceNameInput").value.trim();

  if (!deviceUid || !deviceName) {
    status.textContent =
      "Veuillez renseigner l'identifiant et le nom du module.";
    return;
  }

  // 3. Insertion dans la table devices
  const { error: insertError } = await supabaseClient
    .from("devices")
    .insert({
      user_id: userId,
      device_uid: deviceUid,
      name: deviceName
    });

  if (insertError) {
    status.textContent = "Erreur : " + insertError.message;
    return;
  }

  status.textContent = "Module créé avec succès.";

  // Optionnel : vider les champs
  document.getElementById("deviceUidInput").value = "";
  document.getElementById("deviceNameInput").value = "";
}


  
// ----------------------------------------------------------------
// ✅ VÉRITÉ SERVEUR : UTILISATEUR EXISTE ?
// ----------------------------------------------------------------
async function updateUI() {
  const { data, error } = await supabaseClient.auth.getUser();

  // ✅ utilisateur supprimé / inexistant
  if (error || !data || !data.user) {
    await supabaseClient.auth.signOut();

    document.getElementById("loginBox").style.display = "block";
    document.getElementById("dashboard").style.display = "none";
    return;
  }

  // ✅ utilisateur valide
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("dashboard").style.display = "block";
}

// ✅ au chargement
updateUI();

// ✅ changement d’état auth (login, logout, magic link)
supabaseClient.auth.onAuthStateChange(() => updateUI());

// ----------------------------------------------------------------
// LOGIN MAGIC LINK
// ----------------------------------------------------------------
async function login() {
  const email = document.getElementById("emailInput").value.trim();
  const status = document.getElementById("loginStatus");

  if (!email) {
    status.textContent = "Veuillez entrer un email.";
    return;
  }

  status.textContent = "⏳ Envoi du lien magique...";

  const { error } = await supabaseClient.auth.signInWithOtp({ email });

  status.textContent = error
    ? "❌ " + error.message
    : "✅ Lien envoyé. Vérifiez vos emails.";
}

// ----------------------------------------------------------------
// LOGOUT
// ----------------------------------------------------------------
async function logout() {
  await supabaseClient.auth.signOut();
  updateUI();
}

// ----------------------------------------------------------------
// COURBE
// ----------------------------------------------------------------
async function loadCurve() {
  const deviceId = deviceIdInput.value.trim();
  status.textContent = "⏳ Chargement...";

  const mesures = await fetch(
    `${SUPABASE_URL}/rest/v1/mesures?device_id=eq.${deviceId}&order=timestamp.asc`,
    { headers: { "apikey": SUPABASE_KEY, "Authorization": "Bearer " + SUPABASE_KEY } }
  ).then(r => r.json());

  if (!mesures.length) {
    status.textContent = "Aucune mesure.";
    return;
  }

  const points = mesures.map(m => ({
    x: new Date(m.timestamp),
    y: m.humidity
  }));

  if (chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type: "line",
    data: {
      datasets: [
        {
          label: "Humidité (%)",
          data: points,
          borderColor: "#2c7",
          tension: 0.2
        }
      ]
    },
    options: {
      responsive: true,
      scales: {
        x: { type: "time" },
        y: { min: 0, max: 100 }
      }
    }
  });

  status.textContent = "✅ Courbe prête";
}

// ----------------------------------------------------------------
// ACTIONS
// ----------------------------------------------------------------
async function sendWaterCommand() {
  await fetch(`${SUPABASE_URL}/rest/v1/actions`, {
    method: "POST",
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": "Bearer " + SUPABASE_KEY,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      device_id: deviceIdInput.value,
      action: "water",
      processed: false,
      timestamp: new Date().toISOString()
    })
  });

  loadCurve();
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Jardin en Eau</title>

<style>
  body { font-family: Arial; margin: 30px; }
  h1 { color: #2c7; }
  select, button {
    padding: 8px;
    font-size: 16px;
    margin-top: 10px;
  }
  #chartContainer { max-width: 900px; margin-top: 30px; }
  #status { margin-top: 15px; font-weight: bold; }
</style>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<h1>🌱 Jardin en Eau</h1>

<select id="deviceSelect"></select>
<div id="status"></div>

<div id="chartContainer">
  <canvas id="chart"></canvas>
</div>

<script>
/* ================= SUPABASE ================= */
const SUPABASE_URL = "https://pbciwmsuhaniokugzqhr.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBiY2l3bXN1aGFuaW9rdWd6cWhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MjAwNjYsImV4cCI6MjA5MDE5NjA2Nn0.Fl1-yezxVeatTaIJlUvAKG1X9PhIlworqZ-6vxDyAmo";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* ================= STATE ================= */
let chart = null;
const PAGE_SIZE = 1000;
const MAX_POINTS = 10000;

/* ================= LOAD DEVICES ================= */
async function loadDevices() {
  const { data } = await supabaseClient
    .from("devices")
    .select("device_id, name")
    .order("created_at");

  data.forEach(d => {
    const opt = document.createElement("option");
    opt.value = d.device_id;
    opt.textContent = d.name || d.device_id;
    deviceSelect.appendChild(opt);
  });

  deviceSelect.onchange = () => loadCurve(deviceSelect.value);

  if (data.length) loadCurve(data[0].device_id);
}

/* ================= LOAD CURVE (PAGINATION) ================= */
async function loadCurve(deviceId) {
  status.textContent = "⏳ Chargement...";
  console.clear();
  console.log("Chargement des données pour :", deviceId);

  let allMesures = [];
  let from = 0;

  while (allMesures.length < MAX_POINTS) {
    const to = from + PAGE_SIZE - 1;

    const { data, error } = await supabaseClient
      .from("mesures")
      .select("timestamp, humidity, threshold")
      .eq("device_id", deviceId)
      .order("timestamp")
      .range(from, to);

    if (error) {
      console.error("Erreur Supabase :", error);
      break;
    }

    if (!data || data.length === 0) break;

    allMesures = allMesures.concat(data);

    console.log(`Page ${from} → ${to} : ${data.length} lignes`);

    if (data.length < PAGE_SIZE) break;
    from += PAGE_SIZE;
  }

  console.log("TOTAL lignes récupérées :", allMesures.length);
  status.textContent = `✅ ${allMesures.length} points chargés`;

  drawChart(allMesures);
}

/* ================= DRAW CHART ================= */
function drawChart(mesures) {
  const h = mesures.map(m => ({ x: new Date(m.timestamp), y: m.humidity }));
  const t = mesures.map(m => ({ x: new Date(m.timestamp), y: m.threshold }));

  if (chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type: "line",
    data: {
      datasets: [
        { label: "Humidité (%)", data: h, borderColor: "#2c7", tension: 0.2 },
        { label: "Seuil (%)", data: t, borderColor: "red", pointRadius: 0 }
      ]
    },
    options: {
      parsing: false,
      responsive: true,
      scales: {
        x: { type: "time" },
        y: { min: 0, max: 100 }
      }
    }
  });
}

/* ================= START ================= */
loadDevices();
</script>

</body>
</html>

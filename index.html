<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>PlanteZen</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 420px;
      margin: auto;
      padding: 2rem;
      text-align: center;
    }
    input, button {
      width: 100%;
      padding: 0.7rem;
      margin-top: 1rem;
      font-size: 1rem;
    }
    .hidden {
      display: none;
    }
  </style>
</head>
<body>

  <h1>🌱 PlanteZen</h1>
  <p>Connectez‑vous pour voir vos modules.</p>

  <!-- LOGIN -->
  <div id="loginSection">
    <input
      id="emailInput"
      type="email"
      placeholder="Votre email"
    />
    <button id="loginBtn">📩 Recevoir le lien</button>
  </div>

  <!-- CONNECTÉ -->
  <div id="connectedSection" class="hidden">
    <p>✅ Vous êtes connecté</p>
    <p id="statusMsg"></p>
    <button id="logoutBtn">🚪 Se déconnecter</button>
  </div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    // ✅ CONFIG SUPABASE
    const supabase = createClient(
      "https://pbciwmsuhaniokugzqhr.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBiY2l3bXN1aGFuaW9rdWd6cWhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MjAwNjYsImV4cCI6MjA5MDE5NjA2Nn0.Fl1-yezxVeatTaIJlUvAKG1X9PhIlworqZ-6vxDyAmo" // ⛔ remplace par TA clé publique
    );

    const emailInput = document.getElementById("emailInput");
    const loginBtn = document.getElementById("loginBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const loginSection = document.getElementById("loginSection");
    const connectedSection = document.getElementById("connectedSection");
    const statusMsg = document.getElementById("statusMsg");

    // ✅ MET À JOUR L’INTERFACE
    async function updateUI() {
      const { data: { user } } = await supabase.auth.getUser();

      if (user) {
        loginSection.classList.add("hidden");
        connectedSection.classList.remove("hidden");

        // ✅ ASSOCIATION AUTOMATIQUE DES DEVICES
        const { error } = await supabase
          .from("devices")
          .update({
            user_id: user.id,
            pending_email: null,
          })
          .eq("pending_email", user.email);

        if (error) {
          console.error(error);
          statusMsg.textContent = "⚠️ Erreur lors de l’association";
        } else {
          statusMsg.textContent = "✅ Vos modules sont maintenant associés";
        }
      } else {
        loginSection.classList.remove("hidden");
        connectedSection.classList.add("hidden");
        statusMsg.textContent = "";
      }
    }

    // ✅ MAGIC LINK
    loginBtn.addEventListener("click", async () => {
      const email = emailInput.value.trim();

      if (!email) {
        alert("Veuillez entrer un email");
        return;
      }

      const { error } = await supabase.auth.signInWithOtp({
        email,
        options: {
          emailRedirectTo: window.location.origin,
        },
      });

      if (error) {
        alert("❌ " + error.message);
      } else {
        alert("📩 Lien envoyé ! Vérifiez vos emails.");
      }
    });

    // ✅ LOGOUT
    logoutBtn.addEventListener("click", async () => {
      await supabase.auth.signOut();
      updateUI();
    });

    // ✅ AUTO À CHAQUE CHANGEMENT D’AUTH
    supabase.auth.onAuthStateChange(() => {
      updateUI();
    });

    // ✅ INIT
    updateUI();
  </script>

</body>
</html>

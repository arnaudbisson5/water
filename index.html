<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<title>Plant Curve DDD</title>

<style>
  body { font-family: Arial; margin: 30px; }
  h1 { color: #2c7; }
  input, button, select {
    padding: 10px;
    font-size: 16px;
    margin-top: 10px;
    margin-right: 5px;
  }
  #chartContainer {
    width: 100%;
    max-width: 900px;
    margin-top: 40px;
    display: none;
  }
  #status { margin-top: 20px; font-weight: bold; }
  #loginBox {
    border: 2px solid #ccc;
    padding: 20px;
    max-width: 400px;
    border-radius: 10px;
    margin-bottom: 30px;
  }
  #dashboard { display:none; }
</style>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<h1>🌱 Courbe humidité + seuil + arrosages</h1>

<!-- LOGIN -->
<div id="loginBox">
  <h2>Connexion</h2>
  <input id="emailInput" type="email" placeholder="email@gmail.com" style="width:90%">
  <br>
  <button onclick="login()">Recevoir le lien de connexion</button>
  <p id="loginStatus"></p>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

  <p><strong>Module :</strong></p>
  <select id="deviceSelect"></select>

  <!-- ✅ AJOUT MINIMAL : création de module -->
  <div style="margin-top:10px;">
    <input
      id="newDeviceName"
      placeholder="Nom du nouveau module"
      style="width:220px"
    >
    <button onclick="createDevice()">➕ Créer</button>
  </div>

  <h2>⏱️ Échelle de temps</h2>
  <select id="timeScale" onchange="applyTimeScale()">
    <option value="hour">Dernière heure</option>
    <option value="day" selected>Dernier jour</option>
    <option value="week">Dernière semaine</option>
    <option value="month">Dernier mois</option>
  </select>

  <div id="status"></div>

  <div id="chartContainer">
    <canvas id="chart"></canvas>
  </div>

  <br>
  <button onclick="logout()">Déconnexion</button>
</div>

<script>
/* ================= SUPABASE ================= */
const SUPABASE_URL = "https://pbciwmsuhaniokugzqhr.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBiY2l3bXN1aGFuaW9rdWd6cWhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MjAwNjYsImV4cCI6MjA5MDE5NjA2Nn0.Fl1-yezxVeatTaIJlUvAKG1X9PhIlworqZ-6vxDyAmo";

const supabaseClient = supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

let chart = null;
let currentUser = null;

/* ================= LOGIN ================= */
async function login() {
  const email = emailInput.value.trim();
  const status = loginStatus;
  if (!email) { status.textContent = "Email requis"; return; }

  const { error } = await supabaseClient.auth.signInWithOtp({ email });

  status.textContent = error
    ? "❌ " + error.message
    : "✅ Lien envoyé par email";
}

async function logout() {
  await supabaseClient.auth.signOut();
  location.reload();
}

/* ================= AUTH LISTENER ================= */
supabaseClient.auth.onAuthStateChange(async (event, session) => {
  if (event === "SIGNED_IN" && session) {
    currentUser = session.user;
    loginBox.style.display = "none";
    dashboard.style.display = "block";
    await loadDevices(currentUser.id);
  }
});

/* ================= CHARGER MODULES ================= */
async function loadDevices(userId) {
  deviceSelect.innerHTML = "";

  const { data, error } = await supabaseClient
    .from("devices")
    .select("device_id, name")
    .eq("user_id", userId)
    .order("created_at");

  if (error || !data || data.length === 0) {
    status.textContent = "Aucun module";
    return;
  }

  data.forEach(d => {
    const opt = document.createElement("option");
    opt.value = d.device_id;
    opt.textContent = d.name || d.device_id;
    deviceSelect.appendChild(opt);
  });

  deviceSelect.onchange = () => loadCurve(deviceSelect.value);

  deviceSelect.value = data[0].device_id;
  loadCurve(data[0].device_id);
}

/* ================= ✅ CRÉATION DE MODULE ================= */
async function createDevice() {
  const name = newDeviceName.value.trim();
  if (!name) {
    alert("Veuillez saisir un nom de module");
    return;
  }

  const deviceId = crypto.randomUUID();

  const { error } = await supabaseClient
    .from("devices")
    .insert({
      device_id: deviceId,
      name: name,
      user_id: currentUser.id
    });

  if (error) {
    alert("Erreur création module : " + error.message);
    return;
  }

  newDeviceName.value = "";
  await loadDevices(currentUser.id);

  deviceSelect.value = deviceId;
  loadCurve(deviceId);
}

/* ================= COURBE ================= */
async function loadCurve(deviceId) {
  status.textContent = "⏳ Chargement...";
  chartContainer.style.display = "block";

  const { data: mesures, error } = await supabaseClient
    .from("mesures")
    .select("timestamp, humidity, threshold")
    .eq("device_id", deviceId)
    .order("timestamp");

  if (error || !mesures || mesures.length === 0) {
    status.textContent = "⚠️ Aucune donnée pour ce module";
    chartContainer.style.display = "none";
    return;
  }

  const h = mesures.map(m => ({ x: new Date(m.timestamp), y: m.humidity }));
  const t = mesures.map(m => ({ x: new Date(m.timestamp), y: m.threshold }));

  if (chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type: "line",
    data: {
      datasets: [
        { label: "Humidité (%)", data: h, borderColor: "#2c7", tension: 0.2 },
        { label: "Seuil (%)", data: t, borderColor: "red", pointRadius: 0 }
      ]
    },
    options: {
      parsing: false,
      responsive: true,
      scales: {
        x: { type: "time" },
        y: { min: 0, max: 100 }
      }
    }
  });

  applyTimeScale();
  status.textContent = "✅ Courbe affichée";
}

/* ================= TIME SCALE ================= */
function floorToTenMinutes(d) {
  const x = new Date(d);
  x.setMinutes(Math.floor(x.getMinutes() / 10) * 10, 0, 0);
  return x;
}

function applyTimeScale() {
  if (!chart) return;

  const scale = timeScale.value;
  const now = new Date();
  let start, end = now;

  chart.options.scales.x.time.unit = undefined;
  chart.options.scales.x.ticks = {};

  if (scale === "hour") {
    end = floorToTenMinutes(now);
    start = new Date(end.getTime() - 3600000);
    chart.options.scales.x.time.unit = "minute";
    chart.options.scales.x.ticks.stepSize = 10;
  }
  if (scale === "day") start = new Date(now - 86400000);
  if (scale === "week") {
    start = new Date(now);
    start.setDate(start.getDate() - 6);
    start.setHours(0, 0, 0, 0);
    chart.options.scales.x.time.unit = "day";
  }
  if (scale === "month") start = new Date(now - 30 * 86400000);

  chart.options.scales.x.min = start;
  chart.options.scales.x.max = end;
  chart.update();
}
</script>

</body>
</html>

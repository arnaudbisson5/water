<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>🌱 Jardin en Eau</title>

<style>
  body { font-family: Arial; margin: 30px; }
  h1 { color: #2c7; }
  input, select, button {
    padding: 8px;
    font-size: 16px;
    margin: 5px 5px 5px 0;
  }
  #loginBox { max-width: 400px; border: 2px solid #ccc; padding: 20px; border-radius: 10px; }
  #dashboard { display: none; }
  #status { margin-top: 15px; font-weight: bold; }
  #chartContainer { max-width: 900px; margin-top: 30px; }
</style>

<!-- LIBS -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<h1>🌱 Jardin en Eau</h1>

<!-- LOGIN -->
<div id="loginBox">
  <h2>Connexion</h2>
  <input id="emailInput" type="email" placeholder="email@example.com" style="width:90%">
  <br>
  <button onclick="login()">Recevoir le lien de connexion</button>
  <p id="loginStatus"></p>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

  <p><strong>Module :</strong></p>
  <select id="deviceSelect"></select>

  <h3>⏱️ Échelle de temps</h3>
  <select id="timeScale" onchange="applyTimeScale()">
    <option value="hour">Dernière heure</option>
    <option value="day" selected>Dernier jour</option>
    <option value="week">Dernière semaine</option>
    <option value="month">Dernier mois</option>
  </select>

  <div id="status"></div>

  <div id="chartContainer">
    <canvas id="chart"></canvas>
  </div>

  <br>
  <button onclick="logout()">Déconnexion</button>
</div>

<script>
/* ================= SUPABASE ================= */
const SUPABASE_URL = "https://pbciwmsuhaniokugzqhr.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBiY2l3bXN1aGFuaW9rdWd6cWhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MjAwNjYsImV4cCI6MjA5MDE5NjA2Nn0.Fl1-yezxVeatTaIJlUvAKG1X9PhIlworqZ-6vxDyAmo";

const supabaseClient = supabase.createClient(
  SUPABASE_URL,
  SUPABASE_ANON_KEY
);

/* ================= STATE ================= */
let chart = null;
let allMesures = [];
const PAGE_SIZE = 1000;
const MAX_POINTS = 10000;
let currentUser = null;

/* ================= AUTH ================= */
async function login() {
  const email = emailInput.value.trim();
  if (!email) return;

  const { error } = await supabaseClient.auth.signInWithOtp({ email });
  loginStatus.textContent = error
    ? error.message
    : "✅ Email envoyé (Magic Link)";
}

async function logout() {
  await supabaseClient.auth.signOut();
  location.reload();
}

async function initAuth() {
  const { data: { session } } = await supabaseClient.auth.getSession();

  if (session?.user) {
    currentUser = session.user;
    loginBox.style.display = "none";
    dashboard.style.display = "block";
    loadDevices();
  }
}

supabaseClient.auth.onAuthStateChange(() => location.reload());

/* ================= DEVICES ================= */
async function loadDevices() {
  const { data, error } = await supabaseClient
    .from("devices")
    .select("device_id, name")
    .eq("user_id", currentUser.id)
    .order("created_at");

  if (error || !data?.length) {
    status.textContent = "Aucun module";
    return;
  }

  deviceSelect.innerHTML = "";
  data.forEach(d => {
    const opt = document.createElement("option");
    opt.value = d.device_id;
    opt.textContent = d.name || d.device_id;
    deviceSelect.appendChild(opt);
  });

  deviceSelect.onchange = () => loadCurve(deviceSelect.value);
  loadCurve(data[0].device_id);
}

/* ================= LOAD CURVE (PAGINATED) ================= */
async function loadCurve(deviceId) {
  status.textContent = "⏳ Chargement...";
  console.clear();

  allMesures = [];
  let from = 0;

  while (allMesures.length < MAX_POINTS) {
    const { data } = await supabaseClient
      .from("mesures")
      .select("timestamp, humidity, threshold")
      .eq("device_id", deviceId)
      .order("timestamp")
      .range(from, from + PAGE_SIZE - 1);

    if (!data || data.length === 0) break;

    allMesures = allMesures.concat(data);
    console.log(`Page ${from} → ${from + PAGE_SIZE - 1} : ${data.length} lignes`);

    if (data.length < PAGE_SIZE) break;
    from += PAGE_SIZE;
  }

  status.textContent = `✅ ${allMesures.length} points chargés`;
  console.log("TOTAL chargé :", allMesures.length);

  drawChart();
}

/* ================= CHART ================= */
function drawChart() {
  const h = allMesures.map(m => ({ x: new Date(m.timestamp), y: m.humidity }));
  const t = allMesures.map(m => ({ x: new Date(m.timestamp), y: m.threshold }));

  if (chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type: "line",
    data: {
      datasets: [
        { label: "Humidité (%)", data: h, borderColor: "#2c7", tension: 0.2 },
        { label: "Seuil (%)", data: t, borderColor: "red", pointRadius: 0 }
      ]
    },
    options: {
      parsing: false,
      responsive: true,
      scales: {
        x: { type: "time" },
        y: { min: 0, max: 100 }
      }
    }
  });

  applyTimeScale();
}

/* ================= TIME SCALE ================= */
function applyTimeScale() {
  if (!chart) return;

  const now = new Date();
  let start;

  if (timeScale.value === "hour")  start = new Date(now - 3600000);
  if (timeScale.value === "day")   start = new Date(now - 86400000);
  if (timeScale.value === "week")  start = new Date(now - 7 * 86400000);
  if (timeScale.value === "month") start = new Date(now - 30 * 86400000);

  chart.options.scales.x.min = start;
  chart.options.scales.x.max = now;
  chart.update();
}

/* ================= START ================= */
initAuth();
</script>

</body>
</html>

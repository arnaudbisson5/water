<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<title>Plant Curve</title>

<style>
    body { font-family: Arial; margin: 30px; }
    h1 { color: #2c7; }
    input, button, select {
        padding: 10px;
        font-size: 16px;
        margin-top: 10px;
        margin-right: 5px;
    }
    #chartContainer {
        width: 100%;
        max-width: 900px;
        margin-top: 40px;
    }
    #status {
        margin-top: 20px;
        font-weight: bold;
    }
</style>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>

</head>
<body>

<h1>🌱 Courbe humidité + seuil + arrosages</h1>

<!-- ✅ USER -->
<p><strong>User ID :</strong></p>
<input id="userIdInput"
       value="8aec257d-e395-4463-b828-370704f3d145"
       size="38">
<button onclick="loadDevices()">🔄 Charger modules</button>

<!-- ✅ MODULES -->
<p><strong>Module :</strong></p>
<select id="deviceSelect"></select>

<br>

<button onclick="loadCurve()">Afficher la courbe</button>
<button onclick="sendWaterCommand()" style="background:#4CAF50;color:white;">💧 Arroser maintenant</button>
<button onclick="deleteEverything()" style="background:#b71c1c;color:white;">🗑️ Effacer toutes les données</button>

<h2>⚙️ Envoyer un seuil (%)</h2>
<input id="thresholdInput" value="50" size="6">
<button onclick="sendThreshold()" style="background:#2196F3;color:white;">✅ Enregistrer seuil</button>

<h2>⏱️ Échelle de temps</h2>
<select id="timeScale" onchange="applyTimeScale()">
    <option value="hour">Dernière heure</option>
    <option value="day" selected>Dernier jour</option>
    <option value="week">Dernière semaine</option>
    <option value="month">Dernier mois</option>
</select>

<div id="status"></div>

<div id="chartContainer" style="display:none;">
    <canvas id="chart"></canvas>
</div>

<script>
// --------------------------------------------------
// CONFIG
// --------------------------------------------------
const SUPABASE_URL = "https://pbciwmsuhaniokugzqhr.supabase.co";
const SUPABASE_KEY = "!eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBiY2l3bXN1aGFuaW9rdWd6cWhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MjAwNjYsImV4cCI6MjA5MDE5NjA2Nn0.Fl1-yezxVeatTaIJlUvAKG1X9PhIlworqZ-6vxDyAmo";

let chart = null;

// --------------------------------------------------
// ✅ RÉCUPÉRER LE DEVICE SÉLECTIONNÉ
// --------------------------------------------------
function getSelectedDeviceId() {
    return document.getElementById("deviceSelect").value;
}

// --------------------------------------------------
// ✅ CHARGER LES MODULES DE L’UTILISATEUR
// --------------------------------------------------
async function loadDevices() {
    const userId = document.getElementById("userIdInput").value.trim();
    const select = document.getElementById("deviceSelect");

    select.innerHTML = "";
    document.getElementById("status").textContent = "⏳ Chargement des modules…";

    const devices = await fetch(
        `${SUPABASE_URL}/rest/v1/devices?user_id=eq.${userId}&order=created_at`,
        {
            headers: {
                apikey: SUPABASE_KEY,
                Authorization: "Bearer " + SUPABASE_KEY
            }
        }
    ).then(r => r.json());

    if (!devices.length) {
        document.getElementById("status").textContent = "❌ Aucun module pour cet utilisateur";
        return;
    }

    devices.forEach(d => {
        const o = document.createElement("option");
        o.value = d.device_uid;
        o.textContent = d.name || d.device_uid;
        select.appendChild(o);
    });

    document.getElementById("status").textContent = "✅ Modules chargés";
}

// --------------------------------------------------
// ✅ CHARGER LA COURBE (inchangé, deviceId automatique)
// --------------------------------------------------
async function loadCurve() {

    const deviceId = getSelectedDeviceId();
    const status   = document.getElementById("status");
    const container= document.getElementById("chartContainer");

    if (!deviceId) {
        status.textContent = "❌ Aucun module sélectionné";
        return;
    }

    status.textContent = "⏳ Chargement…";

    const mesures = await fetch(
        `${SUPABASE_URL}/rest/v1/mesures?device_id=eq.${deviceId}&order=timestamp.asc`,
        {
            headers: {
                apikey: SUPABASE_KEY,
                Authorization: "Bearer " + SUPABASE_KEY
            }
        }
    ).then(r => r.json());

    if (!mesures.length) {
        status.textContent = "Aucune mesure.";
        container.style.display = "none";
        return;
    }

    const cleaned = mesures.filter(m =>
        m.timestamp &&
        typeof m.humidity === "number" &&
        typeof m.threshold === "number"
    );

    const humidityPoints = cleaned.map(m => ({
        x: new Date(m.timestamp),
        y: m.humidity
    }));

    const thresholdPoints = cleaned.map(m => ({
        x: new Date(m.timestamp),
        y: m.threshold
    }));

    const actions = await fetch(
        `${SUPABASE_URL}/rest/v1/actions?device_id=eq.${deviceId}&order=timestamp.asc`,
        {
            headers: {
                apikey: SUPABASE_KEY,
                Authorization: "Bearer " + SUPABASE_KEY
            }
        }
    ).then(r => r.json());

    function findClosestHumidity(date) {
        let best = cleaned[0];
        let dt = Math.abs(new Date(best.timestamp) - date);
        for (let m of cleaned) {
            let nd = Math.abs(new Date(m.timestamp) - date);
            if (nd < dt) { best = m; dt = nd; }
        }
        return best.humidity;
    }

    const waterRequests = actions
        .filter(a => a.action === "water" && !a.processed)
        .map(a => ({
            x: new Date(a.timestamp),
            y: findClosestHumidity(new Date(a.timestamp))
        }));

    const waterDone = actions
        .filter(a => a.action === "water" && a.processed)
        .map(a => ({
            x: new Date(a.timestamp),
            y: findClosestHumidity(new Date(a.timestamp))
        }));

    if (chart) chart.destroy();
    container.style.display = "block";

    chart = new Chart(document.getElementById("chart"), {
        type: "line",
        data: {
            datasets: [
                { label: "Humidité (%)", data: humidityPoints, borderColor: "#2c7", tension: 0.2 },
                { label: "Seuil (%)", data: thresholdPoints, borderColor: "red", pointRadius: 0 },
                { label: "Demande arrosage", type: "scatter", data: waterRequests, pointBackgroundColor: "orange", pointRadius: 8 },
                { label: "Arrosage exécuté", type: "scatter", data: waterDone, pointBackgroundColor: "green", pointRadius: 8 }
            ]
        },
        options: {
            parsing: false,
            responsive: true,
            scales: {
                x: { type: "time" },
                y: { min: 0, max: 100 }
            }
        }
    });

    status.textContent = "✅ Courbe prête";
    applyTimeScale();
}

// --------------------------------------------------
// ✅ ÉCHELLE (inchangée)
// --------------------------------------------------
function applyTimeScale() {
    if (!chart) return;
    const scale = document.getElementById("timeScale").value;
    const now = new Date();
    let start;

    switch (scale) {
        case "hour": start = new Date(now - 1 * 3600000); break;
        case "day": start = new Date(now - 24 * 3600000); break;
        case "week": start = new Date(now - 7 * 24 * 3600000); break;
        case "month": start = new Date(now - 30 * 24 * 3600000); break;
    }

    chart.options.scales.x.min = start;
    chart.options.scales.x.max = now;
    chart.update();
}

// --------------------------------------------------
// ✅ COMMANDES (inchangées)
// --------------------------------------------------
async function sendWaterCommand() {
    const deviceId = getSelectedDeviceId();
    await fetch(`${SUPABASE_URL}/rest/v1/actions`, {
        method: "POST",
        headers: {
            apikey: SUPABASE_KEY,
            Authorization: "Bearer " + SUPABASE_KEY,
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            device_id: deviceId,
            action: "water",
            processed: false,
            timestamp: new Date().toISOString()
        })
    });
    loadCurve();
}

async function sendThreshold() {
    const deviceId = getSelectedDeviceId();
    const threshold = parseFloat(document.getElementById("thresholdInput").value);
    await fetch(`${SUPABASE_URL}/rest/v1/actions`, {
        method: "POST",
        headers: {
            apikey: SUPABASE_KEY,
            Authorization: "Bearer " + SUPABASE_KEY,
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            device_id: deviceId,
            action: "set_threshold",
            threshold,
            processed: false,
            timestamp: new Date().toISOString()
        })
    });
    loadCurve();
}

async function deleteEverything() {
    const deviceId = getSelectedDeviceId();
    if (!confirm("Effacer toutes les données ?")) return;
    await fetch(`${SUPABASE_URL}/rest/v1/mesures?device_id=eq.${deviceId}`, {
        method: "DELETE",
        headers: { apikey: SUPABASE_KEY, Authorization: "Bearer " + SUPABASE_KEY }
    });
    await fetch(`${SUPABASE_URL}/rest/v1/actions?device_id=eq.${deviceId}`, {
        method: "DELETE",
        headers: { apikey: SUPABASE_KEY, Authorization: "Bearer " + SUPABASE_KEY }
    });
    loadCurve();
}
</script>

</body>
</html>

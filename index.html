<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Plant Curve</title>

<style>
    body { font-family: Arial; margin: 30px; }
    h1 { color: #2c7; }
    input, button, select { padding: 10px; font-size: 16px; margin-top: 10px; margin-right: 5px; }

    #chartContainer { width: 100%; max-width: 900px; margin-top: 40px; }
    #status { margin-top:20px;font-weight:bold; }

    #loginBox {
        border: 2px solid #ccc;
        padding: 20px;
        max-width: 400px;
        border-radius: 10px;
        margin-bottom: 30px;
    }

    #dashboard { display:none; }
</style>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>
<body>

<h1>🌱 Courbe humidité + seuil + arrosages</h1>

<!-- LOGIN -->
<div id="loginBox">
    <h2>Connexion</h2>
    <p>Entrez votre email pour recevoir un lien :</p>

    <input id="emailInput" type="email" placeholder="votre.email@example.com" style="width:90%">
    <br>
    <button onclick="login()">Se connecter</button>

    <p id="loginStatus"></p>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

<p><strong>Device ID :</strong></p>
<input id="deviceIdInput" value="B483A21F8A3C">

<br><br>
<button onclick="loadCurve()">Afficher la courbe</button>
<button onclick="sendWaterCommand()">💧 Arroser maintenant</button>
<button onclick="logout()">🚪 Déconnexion</button>

<h2>⚙️ Seuil (%)</h2>
<input id="thresholdInput" value="50">
<button onclick="sendThreshold()">✅ Enregistrer</button>

<h2>⏱️ Échelle de temps</h2>
<select id="timeScale" onchange="applyTimeScale()">
    <option value="hour">Dernière heure</option>
    <option value="day" selected>Dernier jour</option>
    <option value="week">Dernière semaine</option>
    <option value="month">Dernier mois</option>
</select>

<div id="status"></div>

<div id="chartContainer" style="display:none;">
    <canvas id="chart"></canvas>
</div>

</div>

<script>
// ----------------------------------------------------------------
// CONFIG SUPABASE
// ----------------------------------------------------------------
const SUPABASE_URL = "https://pbciwmsuhaniokugzqhr.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...."; // clé inchangée

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let chart = null;

// ----------------------------------------------------------------
// SESSION CHECK AU CHARGEMENT
// ----------------------------------------------------------------
(async () => {
    const { data: { session } } = await supabaseClient.auth.getSession();
    toggleUI(!!session);
})();

supabaseClient.auth.onAuthStateChange((_event, session) => {
    toggleUI(!!session);
});

function toggleUI(isLoggedIn) {
    document.getElementById("loginBox").style.display = isLoggedIn ? "none" : "block";
    document.getElementById("dashboard").style.display = isLoggedIn ? "block" : "none";
}

// ----------------------------------------------------------------
// LOGIN
// ----------------------------------------------------------------
async function login() {
    const email = document.getElementById("emailInput").value.trim();
    const status = document.getElementById("loginStatus");

    if (!email) {
        status.textContent = "Veuillez entrer un email.";
        return;
    }

    status.textContent = "⏳ Envoi du lien...";

    const { error } = await supabaseClient.auth.signInWithOtp({ email });

    status.textContent = error
        ? "❌ " + error.message
        : "✅ Email envoyé. Vérifiez votre boîte.";
}

// ----------------------------------------------------------------
// LOGOUT
// ----------------------------------------------------------------
async function logout() {
    await supabaseClient.auth.signOut();
}

// ----------------------------------------------------------------
// CHARGEMENT COURBE
// ----------------------------------------------------------------
async function loadCurve() {
    const deviceId = deviceIdInput.value.trim();
    const status = document.getElementById("status");
    const container = document.getElementById("chartContainer");

    status.textContent = "⏳ Chargement...";

    const mesures = await fetch(
        `${SUPABASE_URL}/rest/v1/mesures?device_id=eq.${deviceId}&order=timestamp.asc`,
        { headers: { "apikey": SUPABASE_KEY, "Authorization": "Bearer " + SUPABASE_KEY } }
    ).then(r => r.json());

    if (!mesures.length) {
        status.textContent = "Aucune mesure.";
        return;
    }

    const points = mesures.map(m => ({ x: new Date(m.timestamp), y: m.humidity }));
    const seuils = mesures.map(m => ({ x: new Date(m.timestamp), y: m.threshold }));

    if (chart) chart.destroy();

    chart = new Chart(document.getElementById("chart"), {
        type: "line",
        data: {
            datasets: [
                { label: "Humidité (%)", data: points, borderColor: "#2c7", tension: 0.2 },
                { label: "Seuil (%)", data: seuils, borderColor: "red", pointRadius: 0 }
            ]
        },
        options: {
            responsive: true,
            scales: {
                x: { type: "time" },
                y: { min: 0, max: 100 }
            }
        }
    });

    container.style.display = "block";
    status.textContent = "✅ Courbe prête";
    applyTimeScale();
}

// ----------------------------------------------------------------
// TIME SCALE
// ----------------------------------------------------------------
function applyTimeScale() {
    if (!chart) return;

    const now = new Date();
    let start = new Date(now);

    switch (timeScale.value) {
        case "hour":  start.setHours(now.getHours() - 1); break;
        case "day":   start.setDate(now.getDate() - 1); break;
        case "week":  start.setDate(now.getDate() - 7); break;
        case "month": start.setMonth(now.getMonth() - 1); break;
    }

    chart.options.scales.x.min = start;
    chart.options.scales.x.max = now;
    chart.update();
}

// ----------------------------------------------------------------
// ACTIONS
// ----------------------------------------------------------------
async function sendWaterCommand() {
    const deviceId = deviceIdInput.value.trim();
    await fetch(`${SUPABASE_URL}/rest/v1/actions`, {
        method: "POST",
        headers: {
            "apikey": SUPABASE_KEY,
            "Authorization": "Bearer " + SUPABASE_KEY,
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            device_id: deviceId,
            action: "water",
            processed: false,
            timestamp: new Date().toISOString()
        })
    });
    loadCurve();
}

async function sendThreshold() {
    const deviceId = deviceIdInput.value.trim();
    const threshold = parseFloat(thresholdInput.value);

    await fetch(`${SUPABASE_URL}/rest/v1/actions`, {
        method: "POST",
        headers: {
            "apikey": SUPABASE_KEY,
            "Authorization": "Bearer " + SUPABASE_KEY,
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            device_id: deviceId,
            action: "set_threshold",
            threshold,
            processed: false,
            timestamp: new Date().toISOString()
        })
    });
    loadCurve();
}

</script>

</body>
</html>

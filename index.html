<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<title>Plant Curve DDD</title>

<style>
  body { font-family: Arial; margin: 30px; }
  h1 { color: #2c7; }
  input, button, select {
    padding: 10px;
    font-size: 16px;
    margin-top: 10px;
    margin-right: 5px;
  }
  #chartContainer {
    width: 100%;
    max-width: 900px;
    margin-top: 40px;
    display: none;
  }
  #status { margin-top: 20px; font-weight: bold; }
  #loginBox {
    border: 2px solid #ccc;
    padding: 20px;
    max-width: 400px;
    border-radius: 10px;
    margin-bottom: 30px;
  }
  #dashboard { display:none; }
  #createBox {
    margin-top: 20px;
    padding: 15px;
    border: 1px dashed #aaa;
    max-width: 400px;
  }
</style>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<h1>🌱 Courbe humidité + seuil + arrosages</h1>

<!-- LOGIN -->
<div id="loginBox">
  <h2>Connexion</h2>
  <input id="emailInput" type="email" placeholder="email@gmail.com" style="width:90%">
  <br>
  <button onclick="login()">Recevoir le lien de connexion</button>
  <p id="loginStatus"></p>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

  <p><strong>Module :</strong></p>
  <select id="deviceSelect"></select>

  <!-- ✅ CRÉATION DE MODULE -->
  <div id="createBox">
    <h3>➕ Nouveau module</h3>
    <input id="newDeviceName" placeholder="Nom du module">
    <button onclick="createDevice()">Créer</button>
  </div>

  <h2>⏱️ Échelle de temps</h2>
  <select id="timeScale" onchange="applyTimeScale()">
    <option value="hour">Dernière heure</option>
    <option value="day" selected>Dernier jour</option>
    <option value="week">Dernière semaine</option>
    <option value="month">Dernier mois</option>
  </select>

  <div id="status"></div>

  <div id="chartContainer">
    <canvas id="chart"></canvas>
  </div>

  <br>
  <button onclick="logout()">Déconnexion</button>
</div>

<script>
/* ================= SUPABASE ================= */
const SUPABASE_URL = "https://pbciwmsuhaniokugzqhr.supabase.co";
const SUPABASE_KEY = "TA_CLE_ANON_ICI";

const supabaseClient = supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

let currentUser = null;
let chart = null;

/* ================= LOGIN ================= */
async function login() {
  const email = emailInput.value.trim();
  if (!email) return;
  const { error } = await supabaseClient.auth.signInWithOtp({ email });
  loginStatus.textContent = error ? error.message : "✅ Email envoyé";
}

async function logout() {
  await supabaseClient.auth.signOut();
  location.reload();
}

/* ================= AUTH ================= */
supabaseClient.auth.onAuthStateChange((event, session) => {
  if (event === "SIGNED_IN") {
    currentUser = session.user;
    loginBox.style.display = "none";
    dashboard.style.display = "block";
    loadDevices();
  }
});

/* ================= LOAD DEVICES ================= */
async function loadDevices(selectId = null) {
  const { data, error } = await supabaseClient
    .from("devices")
    .select("device_id, name")
    .eq("user_id", currentUser.id)
    .order("created_at");

  deviceSelect.innerHTML = "";

  if (error || !data.length) {
    status.textContent = "Aucun module";
    return;
  }

  data.forEach(d => {
    const opt = document.createElement("option");
    opt.value = d.device_id;
    opt.textContent = d.name || d.device_id;
    deviceSelect.appendChild(opt);
  });

  deviceSelect.onchange = () => loadCurve(deviceSelect.value);

  const selected = selectId || data[0].device_id;
  deviceSelect.value = selected;
  loadCurve(selected);
}

/* ================= CREATE DEVICE ================= */
async function createDevice() {
  const name = newDeviceName.value.trim();
  if (!name) { alert("Nom requis"); return; }

  const deviceId = crypto.randomUUID();

  const { error } = await supabaseClient
    .from("devices")
    .insert({
      device_id: deviceId,
      name: name,
      user_id: currentUser.id
    });

  if (error) {
    alert("Erreur création : " + error.message);
    return;
  }

  newDeviceName.value = "";
  await loadDevices(deviceId);
}

/* ================= LOAD CURVE ================= */
async function loadCurve(deviceId) {
  const { data: mesures, error } = await supabaseClient
    .from("mesures")
    .select("timestamp, humidity, threshold")
    .eq("device_id", deviceId)
    .order("timestamp");

  if (error || !mesures.length) {
    status.textContent = "Aucune donnée";
    chartContainer.style.display = "none";
    return;
  }

  chartContainer.style.display = "block";
  status.textContent = "✅ Courbe affichée";

  const h = mesures.map(m => ({ x: new Date(m.timestamp), y: m.humidity }));
  const t = mesures.map(m => ({ x: new Date(m.timestamp), y: m.threshold }));

  if (chart) chart.destroy();

  chart = new Chart(chartCanvas, {
    type: "line",
    data: {
      datasets: [
        { label: "Humidité", data: h, borderColor: "#2c7", tension: 0.2 },
        { label: "Seuil", data: t, borderColor: "red", pointRadius: 0 }
      ]
    },
    options: {
      parsing: false,
      responsive: true,
      scales: {
        x: { type: "time" },
        y: { min: 0, max: 100 }
      }
    }
  });

  applyTimeScale();
}

/* ================= TIME SCALE ================= */
function floorToTenMinutes(d) {
  const x = new Date(d);
  x.setMinutes(Math.floor(x.getMinutes()/10)*10, 0, 0);
  return x;
}

function applyTimeScale() {
  if (!chart) return;
  const scale = timeScale.value;
  const now = new Date();
  let start, end = now;

  if (scale === "hour") {
    end = floorToTenMinutes(now);
    start = new Date(end.getTime() - 3600000);
    chart.options.scales.x.time.unit = "minute";
    chart.options.scales.x.ticks.stepSize = 10;
  }
  if (scale === "day") start = new Date(now - 86400000);
  if (scale === "week") {
    start = new Date(now);
    start.setDate(start.getDate() - 6);
    start.setHours(0,0,0,0);
    chart.options.scales.x.time.unit = "day";
  }
  if (scale === "month") start = new Date(now - 30*86400000);

  chart.options.scales.x.min = start;
  chart.options.scales.x.max = end;
  chart.update();
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Jardin en Eau</title>

  <style>
    body { font-family: Arial, sans-serif; margin: 30px; }
    h1, h2 { color: #2c7; }

    input, button, select {
      padding: 8px;
      font-size: 15px;
      margin: 6px 0;
    }

    #loginBox, #deviceBox {
      border: 1px solid #ccc;
      padding: 15px;
      border-radius: 6px;
      max-width: 420px;
      margin-bottom: 20px;
    }

    #dashboard { display: none; }
    .status { font-weight: bold; margin-top: 10px; }
  </style>

  <!-- ✅ Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>

  <!-- ✅ Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<h1>🌱 Jardin en Eau</h1>

<!-- ================= LOGIN ================= -->
<div id="loginBox">
  <h2>Connexion</h2>
  <input id="emailInput" type="email" placeholder="email@example.com">
  <br>
  <button onclick="login()">Recevoir le lien de connexion</button>
  <p id="loginStatus" class="status"></p>
</div>

<!-- ================= DASHBOARD ================= -->
<div id="dashboard">

  <div id="deviceBox">
    <h2>Modules</h2>
    <select id="deviceSelect"></select>
  </div>

  <label><strong>Période :</strong></label><br>
  <select id="periodSelect">
    <option value="1h">Dernière heure</option>
    <option value="1d" selected>Dernier jour</option>
    <option value="7d">Dernière semaine</option>
    <option value="30d">Dernier mois</option>
  </select>

  <br><br>
  <button onclick="loadCurve()">Afficher la courbe</button>
  <button onclick="logout()">Déconnexion</button>

  <div id="status" class="status"></div>

  <div style="max-width:900px; margin-top:20px;">
    <canvas id="chart"></canvas>
  </div>
</div>

<script>
/* ================= SUPABASE ================= */
const SUPABASE_URL = "https://pbciwmsuhaniokugzqhr.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBiY2l3bXN1aGFuaW9rdWd6cWhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MjAwNjYsImV4cCI6MjA5MDE5NjA2Nn0.Fl1-yezxVeatTaIJlUvAKG1X9PhIlworqZ-6vxDyAmo";

const supabaseClient = supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

let chart = null;

/* ================= AUTH ================= */
async function updateUI() {
  const { data } = await supabaseClient.auth.getUser();
  const logged = !!data?.user;

  loginBox.style.display = logged ? "none" : "block";
  dashboard.style.display = logged ? "block" : "none";

  if (logged) {
    await loadUserDevices();
    loadCurve();
  }
}

supabaseClient.auth.onAuthStateChange(updateUI);
updateUI();

async function login() {
  const email = emailInput.value.trim();
  if (!email) return;

  loginStatus.textContent = "Envoi du lien...";
  const { error } = await supabaseClient.auth.signInWithOtp({ email });

  loginStatus.textContent = error
    ? "❌ " + error.message
    : "✅ Lien envoyé";
}

async function logout() {
  await supabaseClient.auth.signOut();
  location.reload();
}

/* ================= MODULES ================= */
async function loadUserDevices() {
  const { data } = await supabaseClient
    .from("devices")
    .select("device_uid, name")
    .order("created_at");

  deviceSelect.innerHTML = "";
  data?.forEach(d => {
    const opt = document.createElement("option");
    opt.value = d.device_uid;
    opt.textContent = d.name || d.device_uid;
    deviceSelect.appendChild(opt);
  });
}

deviceSelect.addEventListener("change", loadCurve);
periodSelect.addEventListener("change", loadCurve);

/* ================= PÉRIODE ================= */
function getStartDate(period) {
  const now = Date.now();
  const map = {
    "1h": 60 * 60 * 1000,
    "1d": 24 * 60 * 60 * 1000,
    "7d": 7 * 24 * 60 * 60 * 1000,
    "30d": 30 * 24 * 60 * 60 * 1000
  };
  return new Date(now - map[period]);
}

/* ================= COURBE ================= */
async function loadCurve() {
  const deviceId = deviceSelect.value;
  if (!deviceId) return;

  const start = getStartDate(periodSelect.value);
  status.textContent = "Chargement...";

  const url =
    `${SUPABASE_URL}/rest/v1/mesures` +
    `?device_uid=eq.${deviceId}` +
    `&timestamp=gte.${start.toISOString()}` +
    `&order=timestamp.asc`;

  const res = await fetch(url, {
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: "Bearer " + SUPABASE_KEY
    }
  });

  const mesures = await res.json();

  const points = mesures.map(m => ({
    x: new Date(m.timestamp),
    y: m.humidity
  }));

  if (chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type: "line",
    data: {
      datasets: [{
        label: "Humidité (%)",
        data: points,
        borderColor: "#2c7",
        tension: 0.2
      }]
    },
    options: {
      responsive: true,
      scales: {
        x: {
          type: "time",
          time: {
            tooltipFormat: "dd/MM HH:mm"
          }
        },
        y: {
          min: 0,
          max: 100
        }
      }
    }
  });

  status.textContent =
    points.length ? "✅ Courbe affichée" : "⚠️ Aucune donnée";
}
</script>

</body>
</html>

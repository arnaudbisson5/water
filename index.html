<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Mes modules – Humidité</title>

  <style>
    body { font-family: Arial, sans-serif; margin: 30px; }
    h1, h2 { color: #2c7; }

    input, button, select {
      padding: 8px;
      font-size: 15px;
      margin: 6px 0;
    }

    #loginBox, #appBox {
      border: 1px solid #ccc;
      padding: 20px;
      border-radius: 6px;
      max-width: 500px;
      margin-bottom: 20px;
    }

    #appBox { display: none; }
    .status { font-weight: bold; margin-top: 10px; }
  </style>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<h1>🌱 Mes modules</h1>

<!-- ================= LOGIN ================= -->
<div id="loginBox">
  <h2>Connexion</h2>
  <input id="emailInput" type="email" placeholder="email@example.com" />
  <br />
  <button onclick="login()">Recevoir le lien de connexion</button>
  <div id="loginStatus" class="status"></div>
</div>

<!-- ================= APPLICATION ================= -->
<div id="appBox">

  <h2>Mes modules</h2>
  <select id="deviceSelect"></select>

  <br /><br />
  <button onclick="logout()">Déconnexion</button>

  <div id="status" class="status"></div>

  <div style="max-width:900px; margin-top:20px;">
    <canvas id="chart"></canvas>
  </div>
</div>

<script>
/* =====================================================
   CONFIG SUPABASE
===================================================== */
const SUPABASE_URL = "https://TON-PROJET.supabase.co";
const SUPABASE_ANON_KEY = "!eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBiY2l3bXN1aGFuaW9rdWd6cWhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MjAwNjYsImV4cCI6MjA5MDE5NjA2Nn0.Fl1-yezxVeatTaIJlUvAKG1X9PhIlworqZ-6vxDyAmo";

const supabaseClient = supabase.createClient(
  SUPABASE_URL,
  SUPABASE_ANON_KEY
);

let chart = null;

/* =====================================================
   AUTH UI
===================================================== */
async function updateUI() {
  const { data } = await supabaseClient.auth.getUser();
  const logged = !!data?.user;

  document.getElementById("loginBox").style.display =
    logged ? "none" : "block";

  document.getElementById("appBox").style.display =
    logged ? "block" : "none";

  if (logged) {
    await loadDevices();
  }
}

supabaseClient.auth.onAuthStateChange(updateUI);
updateUI();

/* =====================================================
   LOGIN / LOGOUT
===================================================== */
async function login() {
  const email = emailInput.value.trim();
  if (!email) return;

  loginStatus.textContent = "Envoi du lien…";

  const { error } = await supabaseClient.auth.signInWithOtp({ email });

  loginStatus.textContent = error
    ? "❌ " + error.message
    : "✅ Vérifiez votre email";
}

async function logout() {
  await supabaseClient.auth.signOut();
  location.reload();
}

/* =====================================================
   DEVICES
===================================================== */
async function loadDevices() {
  const { data, error } = await supabaseClient
    .from("devices")
    .select("device_uid, name")
    .order("created_at");

  if (error) {
    console.error(error);
    status.textContent = "❌ Erreur chargement modules";
    return;
  }

  const select = document.getElementById("deviceSelect");
  select.innerHTML = "";

  data.forEach(d => {
    const opt = document.createElement("option");
    opt.value = d.device_uid;
    opt.textContent = d.name || d.device_uid;
    select.appendChild(opt);
  });

  if (data.length > 0) {
    await loadMesures(data[0].device_uid);
  }
}

deviceSelect.addEventListener("change", e => {
  loadMesures(e.target.value);
});

/* =====================================================
   MESURES + COURBE
===================================================== */
async function loadMesures(deviceUid) {
  status.textContent = "Chargement des mesures…";

  const { data, error } = await supabaseClient
    .from("mesures")
    .select("timestamp, humidity")
    .eq("device_uid", deviceUid)
    .order("timestamp");

  if (error) {
    console.error(error);
    status.textContent = "❌ Erreur lecture mesures";
    return;
  }

  const points = data.map(m => ({
    x: new Date(m.timestamp),
    y: m.humidity
  }));

  if (chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type: "line",
    data: {
      datasets: [{
        label: "Humidité (%)",
        data: points,
        borderColor: "#2c7",
        tension: 0.2
      }]
    },
    options: {
      responsive: true,
      scales: {
        x: { type: "time" },
        y: { min: 0, max: 100 }
      }
    }
  });

  status.textContent =
    points.length
      ? "✅ Courbe affichée"
      : "⚠️ Aucune mesure pour ce module";
}
</script>

</body>
</html>

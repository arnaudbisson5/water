<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Jardin en Eau</title>

  <style>
    body { font-family: Arial, sans-serif; margin: 30px; }
    h1, h2 { color: #2c7; }

    input, button, select {
      padding: 8px;
      font-size: 15px;
      margin: 6px 0;
    }

    #loginBox, #deviceBox {
      border: 1px solid #ccc;
      padding: 15px;
      border-radius: 6px;
      max-width: 420px;
      margin-bottom: 20px;
    }

    #dashboard { display: none; }
    .status { font-weight: bold; margin-top: 10px; }

    #debugSwitch {
      margin-bottom: 12px;
      padding: 6px;
      border: 1px dashed #aaa;
    }
  </style>

  <!-- ✅ SCRIPTS CORRECTS -->
  <script src="https://cdn/npm/chart.js@4
  https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns
  https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2
</head>

<body>

<h1>🌱 Jardin en Eau</h1>

<!-- ================= LOGIN ================= -->
<div id="loginBox">

  <!-- ✅ SWITCH DEBUG (GARANTI VISIBLE) -->
  <div id="debugSwitch">
    <label>
      <input type="checkbox" id="debugToggle">
      Mode debug (bypass magic link)
    </label>
  </div>

  <h2>Connexion</h2>
  <input id="emailInput" type="email" placeholder="email@example.com">
  <br>
  <button onclick="login()">Recevoir le lien de connexion</button>
  <p id="loginStatus" class="status"></p>
</div>

<!-- ================= DASHBOARD ================= -->
<div id="dashboard">

  <div id="deviceBox">
    <h2>Modules</h2>
    <select id="deviceSelect"></select>
  </div>

  <button onclick="loadCurve()">Afficher la courbe (7 jours)</button>
  <button onclick="logout()">Déconnexion</button>

  <div id="status" class="status"></div>

  <div style="max-width:900px;margin-top:20px">
    <canvas id="chart"></canvas>
  </div>
</div>

<script>
const SUPABASE_URL = "https://pbciwmsuhaniokugzqhr.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBiY2l3bXN1aGFuaW9rdWd6cWhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MjAwNjYsImV4cCI6MjA5MDE5NjA2Nn0.Fl1-yezxVeatTaIJlUvAKG1X9PhIlworqZ-6vxDyAmo";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let chart = null;

function isDebug() {
  return document.getElementById("debugToggle").checked;
}

async function login() {
  if (isDebug()) {
    loginBox.style.display = "none";
    dashboard.style.display = "block";
    await loadUserDevices();
    loadCurve();
    return;
  }

  const email = emailInput.value.trim();
  if (!email) return;

  loginStatus.textContent = "Envoi du lien...";
  const { error } = await supabaseClient.auth.signInWithOtp({ email });
  loginStatus.textContent = error ? "❌ " + error.message : "✅ Lien envoyé";
}

async function logout() {
  await supabaseClient.auth.signOut();
  location.reload();
}

async function loadUserDevices() {
  const { data } = await supabaseClient
    .from("devices")
    .select("device_uid, name")
    .order("created_at");

  deviceSelect.innerHTML = "";
  data?.forEach(d => {
    const o = document.createElement("option");
    o.value = d.device_uid;
    o.textContent = d.name || d.device_uid;
    deviceSelect.appendChild(o);
  });
}

async function loadCurve() {
  const uid = deviceSelect.value;
  if (!uid) return;

  status.textContent = "Chargement...";

  const since = new Date(Date.now() - 7*24*60*60*1000).toISOString();

  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/mesures?device_uid=eq.${uid}&timestamp=gte.${since}&order=timestamp.asc`,
    {
      headers: {
        apikey: SUPABASE_KEY,
        Authorization: "Bearer " + SUPABASE_KEY
      }
    }
  );

  const mesures = await res.json();
  if (!Array.isArray(mesures)) {
    status.textContent = "Erreur données";
    return;
  }

  const points = mesures.map(m => ({
    x: new Date(m.timestamp),
    y: m.humidity
  }));

  if (chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type: "line",
    data: {
      datasets: [{
        label: "Humidité – 7 jours",
        data: points,
        borderColor: "#2c7",
        tension: 0.2
      }]
    },
    options: {
      scales: {
        x: { type: "time" },
        y: { min: 0, max: 100 }
      }
    }
  });

  status.textContent = "✅";
}
</script>

</body>
</html>

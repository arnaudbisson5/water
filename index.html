<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<title>Plant Curve CCC</title>

<style>
  body { font-family: Arial; margin: 30px; }
  h1 { color: #2c7; }
  input, button, select {
    padding: 10px;
    font-size: 16px;
    margin-top: 10px;
    margin-right: 5px;
  }
  #chartContainer {
    width: 100%;
    max-width: 900px;
    margin-top: 40px;
    display: none;
  }
  #status {
    margin-top: 20px;
    font-weight: bold;
  }
  #loginBox {
    border: 2px solid #ccc;
    padding: 20px;
    max-width: 400px;
    border-radius: 10px;
    margin-bottom: 30px;
  }
  #dashboard { display:none; }
</style>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<h1>🌱 Courbe humidité + seuil + arrosages</h1>

<!-- LOGIN -->
<div id="loginBox">
  <h2>Connexion</h2>
  <input id="emailInput" type="email" placeholder="email@gmail.com" style="width:90%">
  <br>
  <button onclick="login()">Recevoir le lien de connexion</button>
  <p id="loginStatus"></p>
</div>

<!-- DASHBOARD -->
<div id="dashboard">

  <p><strong>Module :</strong></p>
  <select id="deviceSelect"></select>

  <h2>⏱️ Échelle de temps</h2>
  <select id="timeScale" onchange="applyTimeScale()">
    <option value="hour">Dernière heure</option>
    <option value="day" selected>Dernier jour</option>
    <option value="week">Dernière semaine</option>
    <option value="month">Dernier mois</option>
  </select>

  <div id="status"></div>

  <div id="chartContainer">
    <canvas id="chart"></canvas>
  </div>

  <br>
  <button onclick="logout()">Déconnexion</button>
</div>

<script>
/* ================= SUPABASE ================= */
const SUPABASE_URL = "https://pbciwmsuhaniokugzqhr.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBiY2l3bXN1aGFuaW9rdWd6cWhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MjAwNjYsImV4cCI6MjA5MDE5NjA2Nn0.Fl1-yezxVeatTaIJlUvAKG1X9PhIlworqZ-6vxDyAmo";

const supabaseClient = supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

let chart = null;

/* ================= LOGIN ================= */
async function login() {
  const email = document.getElementById("emailInput").value.trim();
  const status = document.getElementById("loginStatus");
  if (!email) { status.textContent = "Email requis"; return; }

  const { error } = await supabaseClient.auth.signInWithOtp({ email });

  status.textContent = error
    ? "❌ " + error.message
    : "✅ Lien envoyé par email";
}

async function logout() {
  await supabaseClient.auth.signOut();
  location.reload();
}

/* ================= AUTH LISTENER ================= */
supabaseClient.auth.onAuthStateChange((event, session) => {
  if (event === "SIGNED_IN") {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
    initDashboard(session.user);
  }
});

/* ================= INIT ================= */
async function initDashboard(user) {
  await loadDevices(user.id);
}

/* ================= LOAD MODULES ================= */
async function loadDevices(userId) {
  const select = document.getElementById("deviceSelect");
  select.innerHTML = "";

  const { data, error } = await supabaseClient
    .from("devices")
    .select("device_uid, name")
    .eq("user_id", userId)
    .order("created_at");

  if (error || !data.length) {
    document.getElementById("status").textContent = "Aucun module";
    return;
  }

  data.forEach(d => {
    const opt = document.createElement("option");
    opt.value = d.device_uid;
    opt.textContent = d.name || d.device_uid;
    select.appendChild(opt);
  });

  select.onchange = () => loadCurve(select.value);
  loadCurve(data[0].device_uid);
}

/* ================= LOAD CURVE ================= */
async function loadCurve(deviceId) {
  document.getElementById("status").textContent = "Chargement...";
  document.getElementById("chartContainer").style.display = "block";

  const { data: mesures, error } = await supabaseClient
    .from("mesures")
    .select("timestamp, humidity, threshold")
    .eq("device_uid", deviceId)
    .order("timestamp");

  if (error || !mesures.length) {
    document.getElementById("status").textContent = "Aucune donnée";
    return;
  }

  const humidity = mesures.map(m => ({ x: new Date(m.timestamp), y: m.humidity }));
  const threshold = mesures.map(m => ({ x: new Date(m.timestamp), y: m.threshold }));

  if (chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type: "line",
    data: {
      datasets: [
        { label: "Humidité (%)", data: humidity, borderColor: "#2c7", tension: 0.2 },
        { label: "Seuil (%)", data: threshold, borderColor: "red", pointRadius: 0 }
      ]
    },
    options: {
      parsing: false,
      responsive: true,
      scales: {
        x: { type: "time" },
        y: { min: 0, max: 100 }
      }
    }
  });

  applyTimeScale();
  document.getElementById("status").textContent = "✅ Courbe affichée";
}

/* ================= TIME SCALE ================= */
function floorToTenMinutes(d) {
  const x = new Date(d);
  x.setMinutes(Math.floor(x.getMinutes()/10)*10, 0, 0);
  return x;
}

function applyTimeScale() {
  if (!chart) return;

  const scale = document.getElementById("timeScale").value;
  const now = new Date();
  let start, end;

  chart.options.scales.x.time.unit = undefined;
  chart.options.scales.x.ticks = {};

  if (scale === "hour") {
    end = floorToTenMinutes(now);
    start = new Date(end.getTime() - 60*60*1000);
    chart.options.scales.x.time.unit = "minute";
    chart.options.scales.x.ticks.stepSize = 10;
  }

  if (scale === "day") {
    start = new Date(now.getTime() - 24*60*60*1000);
    end = now;
  }

  if (scale === "week") {
    start = new Date(now);
    start.setHours(0,0,0,0);
    start.setDate(start.getDate()-6);
    end = now;
    chart.options.scales.x.time.unit = "day";
  }

  if (scale === "month") {
    start = new Date(now.getTime() - 30*24*60*60*1000);
    end = now;
  }

  chart.options.scales.x.min = start;
  chart.options.scales.x.max = end;
  chart.update();
}
</script>

</body>
</html>

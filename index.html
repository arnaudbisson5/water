<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Jardin en Eau</title>

  <style>
    body { font-family: Arial, sans-serif; margin: 30px; }
    h1, h2 { color: #2c7; }

    input, button, select {
      padding: 8px;
      font-size: 15px;
      margin: 6px 0;
    }

    #loginBox, #deviceBox {
      border: 1px solid #ccc;
      padding: 15px;
      border-radius: 6px;
      max-width: 420px;
      margin-bottom: 20px;
    }

    #dashboard { display: none; }
    .status { font-weight: bold; margin-top: 10px; }
  </style>

  
  <!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart src="https://cdn/npm/chartjs-adapter-date-fns</script>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
</head>
<body>

<h1>🌱 Jardin en Eau</h1>

<!-- ================= LOGIN ================= -->
<div id="loginBox">
  <h2>Connexion</h2>
  <p>Entrez votre email pour recevoir un lien magique :</p>
  <input id="emailInput" type="email" placeholder="email@example.com">
  <br>
  <button onclick="login()">Recevoir le lien de connexion</button>
  <p id="loginStatus" class="status"></p>
</div>

<!-- ================= DASHBOARD ================= -->
<div id="dashboard">

  <!-- ===== MODULES ===== -->
  <div id="deviceBox">
    <h2>Modules</h2>

    <label for="deviceSelect"><strong>Module actif :</strong></label><br>
    <select id="deviceSelect"></select>

    <h3>Ajouter un module</h3>
    <input id="deviceUidInput" placeholder="Device UID (ESP)">
    <input id="deviceNameInput" placeholder="Nom du module">
    <br>
    <button onclick="createDevice()">Créer le module</button>
    <p id="deviceStatus" class="status"></p>
  </div>

  <!-- ===== COURBE ===== -->
  <h2>Courbe humidité</h2>
  <button onclick="loadCurve()">Afficher la courbe</button>
  <button onclick="sendWaterCommand()">💧 Arroser maintenant</button>
  <button onclick="logout()">🚪 Déconnexion</button>

  <div id="status" class="status"></div>

  <div style="max-width: 900px; margin-top: 20px;">
    <canvas id="chart"></canvas>
  </div>
</div>

<script>
/* ============================================================
   CONFIG SUPABASE
============================================================ */
const SUPABASE_URL = "https://pbciwmsuhaniokugzqhr.supabase.co";
const SUPABASE_KEY = "TA_CLE_ANON_ICI";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let chart = null;

/* ============================================================
   AUTH UI (✅ UNIQUEMENT AUTH)
============================================================ */
async function updateUI() {
  const { data } = await supabaseClient.auth.getUser();

  if (!data?.user) {
    loginBox.style.display = "block";
    dashboard.style.display = "none";
  } else {
    loginBox.style.display = "none";
    dashboard.style.display = "block";

    await loadUserDevices();   // charge les modules
    loadCurve();               // affiche la courbe du module actif
  }
}

supabaseClient.auth.onAuthStateChange(updateUI);

/* ============================================================
   LOGIN
============================================================ */
async function login() {
  const email = emailInput.value.trim();
  if (!email) return;

  loginStatus.textContent = "Envoi du lien...";

  try {
    const { error } = await supabaseClient.auth.signInWithOtp({ email });

    if (error) {
      loginStatus.textContent = "Erreur : " + error.message;
    } else {
      loginStatus.textContent = "✅ Lien envoyé, vérifiez vos emails.";
    }
  } catch (err) {
    console.error(err);
    loginStatus.textContent = "❌ Erreur technique (voir console)";
  }
}

/* ============================================================
   LOGOUT
============================================================ */
async function logout() {
  await supabaseClient.auth.signOut();
  location.reload();
}

/* ============================================================
   MODULES
============================================================ */
async function loadUserDevices() {
  const { data: devices, error } = await supabaseClient
    .from("devices")
    .select("device_uid, name")
    .order("created_at");

  if (error) {
    console.error(error);
    return;
  }

  deviceSelect.innerHTML = "";

  devices.forEach(d => {
    const opt = document.createElement("option");
    opt.value = d.device_uid;
    opt.textContent = d.name || d.device_uid;
    deviceSelect.appendChild(opt);
  });
}

/* ✅ Mise à jour automatique quand on change de module */
deviceSelect.addEventListener("change", () => {
  loadCurve();
});

async function createDevice() {
  const uid = deviceUidInput.value.trim();
  const name = deviceNameInput.value.trim();
  if (!uid || !name) return;

  const { data } = await supabaseClient.auth.getUser();

  const { error } = await supabaseClient.from("devices").insert({
    user_id: data.user.id,
    device_uid: uid,
    name: name
  });

  deviceStatus.textContent = error
    ? "Erreur : " + error.message
    : "Module créé ✅";

  deviceUidInput.value = "";
  deviceNameInput.value = "";
  await loadUserDevices();
  loadCurve();
}

/* ============================================================
   COURBE
============================================================ */
async function loadCurve() {
  const deviceId = deviceSelect.value;
  status.textContent = "⏳ Chargement...";

  if (!deviceId) {
    status.textContent = "Aucun module sélectionné.";
    return;
  }

  const mesures = await fetch(
    `${SUPABASE_URL}/rest/v1/mesures?device_id=eq.${deviceId}&order=timestamp.asc`,
    {
      headers: {
        apikey: SUPABASE_KEY,
        Authorization: "Bearer " + SUPABASE_KEY
      }
    }
  ).then(r => r.json());

  if (!mesures.length) {
    status.textContent =
      "⚠️ Aucune donnée pour ce module.\n" +
      "Vérifiez qu’un ESP envoie bien des mesures.";
    if (chart) chart.destroy();
    return;
  }

  const points = mesures.map(m => ({
    x: new Date(m.timestamp),
    y: m.humidity
  }));

  if (chart) chart.destroy();

  chart = new Chart(chartCanvas, {
    type: "line",
    data: {
      datasets: [{
        label: "Humidité (%)",
        data: points,
        borderColor: "#2c7",
        tension: 0.2
      }]
    },
    options: {
      responsive: true,
      scales: {
        x: { type: "time" },
        y: { min: 0, max: 100 }
      }
    }
  });

  status.textContent = "✅ Courbe affichée";
}

/* ============================================================
   ACTION ARROSAGE
============================================================ */
async function sendWaterCommand() {
  const deviceId = deviceSelect.value;
  if (!deviceId) return;

  await fetch(`${SUPABASE_URL}/rest/v1/actions`, {
    method: "POST",
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: "Bearer " + SUPABASE_KEY,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      device_id: deviceId,
      action: "water",
      processed: false,
      timestamp: new Date().toISOString()
    })
  });

  loadCurve();
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<title>Jardin en Eau</title>

<style>
  body { font-family: Arial; margin: 30px; }
  h1 { color: #2c7; }
  input, button, select {
    padding: 10px;
    font-size: 16px;
    margin-top: 10px;
    margin-right: 5px;
  }
  #loginBox {
    border: 2px solid #ccc;
    padding: 20px;
    max-width: 400px;
    border-radius: 10px;
  }
  #dashboard { display: none; }
  #chartContainer {
    width: 100%;
    max-width: 900px;
    margin-top: 40px;
    display: none;
  }
  #status, #thresholdStatus {
    margin-top: 15px;
    font-weight: bold;
  }
</style>

<!-- ✅ SCRIPTS OBLIGATOIRES -->
https://cdn.jsdelivr.net/npm/chart.js
https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-jsbody>

<h1>🌱 Jardin en Eau</h1>

<!-- ✅ LOGIN -->
<div id="loginBox">
  <h2>Connexion</h2>
  <input id="emailInput" type="email" placeholder="email@example.com" style="width:90%">
  <br>
  <button onclick="login()">Recevoir le lien de connexion</button>
  <p id="loginStatus"></p>
</div>

<!-- ✅ DASHBOARD -->
<div id="dashboard">

  <p><strong>Module :</strong></p>
  <select id="deviceSelect"></select>

  <!-- ✅ SEUIL -->
  <h2>🎚️ Consigne de seuil</h2>
  <div>
    <input
      id="thresholdInput"
      type="number"
      min="0"
      max="100"
      placeholder="Seuil (%)"
      style="width:120px"
    >
    <button onclick="sendThreshold()">📤 Envoyer</button>
  </div>
  <div id="thresholdStatus"></div>

  <!-- ✅ TEMPS -->
  <h2>⏱️ Échelle de temps</h2>
  <select id="timeScale" onchange="applyTimeScale()">
    <option value="hour">Dernière heure</option>
    <option value="day" selected>Dernier jour</option>
    <option value="week">Dernière semaine</option>
    <option value="month">Dernier mois</option>
  </select>

  <div id="status"></div>

  <!-- ✅ GRAPHE -->
  <div id="chartContainer">
    <canvas id="chart"></canvas>
  </div>

  <br>
  <button onclick="logout()">Déconnexion</button>
</div>

<script>
/* ================= SUPABASE ================= */
const SUPABASE_URL = "https://pbciwmsuhaniokugzqhr.supabase.co";
const SUPABASE_ANON_KEY = "💡COLLE_TA_CLE_ANON_ICI";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* ================= STATE ================= */
let currentUser = null;
let chart = null;

/* ================= AUTH ================= */
async function login() {
  const email = emailInput.value.trim();
  if (!email) return;
  const { error } = await supabaseClient.auth.signInWithOtp({ email });
  loginStatus.textContent = error ? error.message : "✅ Email envoyé";
}

async function logout() {
  await supabaseClient.auth.signOut();
  location.reload();
}

async function initAuth() {
  const { data: { session } } = await supabaseClient.auth.getSession();
  if (session?.user) {
    currentUser = session.user;
    loginBox.style.display = "none";
    dashboard.style.display = "block";
    loadDevices();
  }
}
supabaseClient.auth.onAuthStateChange(() => location.reload());

/* ================= DEVICES ================= */
async function loadDevices() {
  deviceSelect.innerHTML = "";

  const { data, error } = await supabaseClient
    .from("devices")
    .select("device_id, name, threshold")
    .eq("user_id", currentUser.id);

  if (error || !data.length) {
    status.textContent = "❌ Aucun module";
    return;
  }

  data.forEach(d => {
    const opt = document.createElement("option");
    opt.value = d.device_id;
    opt.textContent = d.name || d.device_id;
    deviceSelect.appendChild(opt);
  });

  deviceSelect.onchange = () => loadCurve(deviceSelect.value);
  thresholdInput.value = data[0].threshold ?? "";
  loadCurve(data[0].device_id);
}

/* ================= SEND THRESHOLD ================= */
async function sendThreshold() {
  const value = Number(thresholdInput.value);
  const deviceId = deviceSelect.value;

  if (isNaN(value) || value < 0 || value > 100) {
    thresholdStatus.textContent = "❌ Valeur invalide (0–100)";
    return;
  }

  const { error } = await supabaseClient
    .from("devices")
    .update({ threshold: value })
    .eq("device_id", deviceId)
    .eq("user_id", currentUser.id);

  thresholdStatus.textContent = error
    ? "❌ Erreur d'envoi"
    : `✅ Seuil envoyé (${value}%)`;

  if (!error) loadCurve(deviceId);
}

/* ================= CURVE ================= */
async function loadCurve(deviceId) {
  const { data } = await supabaseClient
    .from("mesures")
    .select("timestamp, humidity, threshold")
    .eq("device_id", deviceId)
    .order("timestamp");

  if (!data || !data.length) {
    status.textContent = "⚠️ Pas de données";
    chartContainer.style.display = "none";
    return;
  }

  chartContainer.style.display = "block";
  status.textContent = `✅ ${data.length} points`;

  const h = data.map(m => ({ x: new Date(m.timestamp), y: m.humidity }));
  const t = data.map(m => ({ x: new Date(m.timestamp), y: m.threshold }));

  if (chart) chart.destroy();
  chart = new Chart(chart, {
    type: "line",
    data: {
      datasets: [
        { label: "Humidité (%)", data: h, borderColor: "#2c7", tension: 0.2 },
        { label: "Seuil (%)", data: t, borderColor: "red", pointRadius: 0 }
      ]
    },
    options: {
      parsing: false,
      scales: {
        x: { type: "time" },
        y: { min: 0, max: 100 }
      }
    }
  });

  applyTimeScale();
}

/* ================= TIME ================= */
function applyTimeScale() {
  if (!chart) return;
  const now = new Date();
  let delta = 86400000;
  if (timeScale.value === "hour") delta = 3600000;
  if (timeScale.value === "week") delta = 7 * 86400000;
  if (timeScale.value === "month") delta = 30 * 86400000;
  chart.options.scales.x.min = new Date(now - delta);
  chart.options.scales.x.max = now;
  chart.update();
}

/* ================= START ================= */
initAuth();
</script>

</body>
</html>

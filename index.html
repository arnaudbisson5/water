<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<title>🌱 Jardin en Eau</title>

<style>
  body { font-family: Arial; margin: 30px; }
  h1 { color: #2c7; }
  input, button, select {
    padding: 10px;
    font-size: 16px;
    margin-top: 10px;
    margin-right: 5px;
  }
  #loginBox {
    border: 2px solid #ccc;
    padding: 20px;
    max-width: 400px;
    border-radius: 10px;
  }
  #dashboard { display: none; }
  #chartContainer {
    width: 100%;
    max-width: 900px;
    margin-top: 40px;
  }
  #status { margin-top: 20px; font-weight: bold; }
</style>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<h1>🌱 Jardin en Eau</h1>

<div id="loginBox">
  <h2>Connexion</h2>
  <input id="emailInput" type="email" placeholder="email@example.com" style="width:90%">
  <br>
  <button onclick="login()">Recevoir le lien de connexion</button>
  <p id="loginStatus"></p>
</div>

<div id="dashboard">

  <h2>🔌 Module</h2>
  <select id="deviceSelect"></select>

  <div>
    <input id="deviceNameInput" placeholder="Nom du module" style="width:220px">
    <button onclick="renameDevice()">✏️ Renommer</button>
  </div>

  <h2>🎚️ Seuil d'humidité</h2>
  <input id="thresholdInput" type="number" min="0" max="100" placeholder="Seuil (%)">
  <button onclick="sendThreshold()">📤 Envoyer</button>
  <div id="thresholdStatus"></div>

  <h2>💧 Arrosage manuel</h2>
  <button onclick="manualWater()">🚿 Arroser maintenant</button>

  <h2>⏱️ Échelle de temps</h2>
  <select id="timeScale" onchange="applyTimeScale()">
    <option value="hour">Dernière heure</option>
    <option value="day" selected>Dernier jour</option>
    <option value="week">Dernière semaine</option>
    <option value="month">Dernier mois</option>
  </select>

  <div id="status"></div>

  <div id="chartContainer">
    <canvas id="chart"></canvas>
  </div>

  <br>
  <button onclick="logout()">Déconnexion</button>
</div>

<script>
/* ================= SUPABASE ================= */
const SUPABASE_URL = "https://pbciwmsuhaniokugzqhr.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBiY2l3bXN1aGFuaW9rdWd6cWhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MjAwNjYsImV4cCI6MjA5MDE5NjA2Nn0.Fl1-yezxVeatTaIJlUvAKG1X9PhIlworqZ-6vxDyAmo";

const supabaseClient = supabase.createClient(
  SUPABASE_URL,
  SUPABASE_ANON_KEY,
  {
    auth: {
      detectSessionInUrl: true,
      persistSession: true,
      autoRefreshToken: true
    }
  }
);

/* ================= DEBUG AU CHARGEMENT ================= */
console.log("🔍 PAGE LOAD URL :", window.location.href);
console.log("🍪 COOKIES :", document.cookie);

(async () => {
  const { data, error } = await supabaseClient.auth.getSession();
  console.log("🧠 getSession() AU LOAD :", data.session);
  console.log("❗ getSession error :", error);
})();

(async () => {
  const { data } = await supabaseClient.auth.getUser();
  console.log("👤 getUser() AU LOAD :", data.user);
})();

/* ================= STATE ================= */
let currentUser = null;
let chart = null;

/* ================= AUTH ================= */
async function login() {
  const email = emailInput.value.trim();
  console.log("📨 LOGIN CLICK → email =", email);
  if (!email) return;

  const { error } = await supabaseClient.auth.signInWithOtp({ email });
  loginStatus.textContent = error ? error.message : "✅ Email envoyé";
}

async function logout() {
  console.log("🚪 LOGOUT");
  await supabaseClient.auth.signOut();
  location.reload();
}

/* ================= AUTH EVENTS ================= */
supabaseClient.auth.onAuthStateChange(async (event, session) => {
  console.log("🔔 onAuthStateChange EVENT :", event);
  console.log("🔔 SESSION :", session);

  if (session?.user) {
    console.log("✅ SESSION ACTIVE — affichage dashboard");
    currentUser = session.user;
    loginBox.style.display = "none";
    dashboard.style.display = "block";
    await loadDevices();
  }
});

/* ================= DEVICES ================= */
async function loadDevices() {
  console.log("📦 loadDevices() appelé pour :", currentUser.email);

  deviceSelect.innerHTML = "";
  status.textContent = "";

  const { data, error } = await supabaseClient
    .from("devices")
    .select("id, name")
    .eq("pending_email", currentUser.email)
    .order("created_at");

  console.log("📦 devices SELECT result :", data, error);

  if (error) {
    status.textContent = error.message;
    return;
  }

  if (!data?.length) {
    status.textContent = "❌ Aucun module";
    return;
  }

  const seen = new Set();
  data.forEach(d => {
    if (seen.has(d.id)) return;
    seen.add(d.id);

    const opt = document.createElement("option");
    opt.value = d.id;
    opt.textContent = d.name || d.id;
    deviceSelect.appendChild(opt);
  });

  deviceSelect.onchange = () => loadCurve(deviceSelect.value);
  loadCurve(deviceSelect.value);
}

/* ================= ACTIONS ================= */
async function sendThreshold() {
  const v = parseInt(thresholdInput.value);
  console.log("🎚️ sendThreshold =", v);
  if (isNaN(v)) return;

  await supabaseClient.from("actions").insert({
    device_id: deviceSelect.value,
    action: "set_threshold",
    threshold: v,
    processed: false
  });
}

async function manualWater() {
  console.log("💧 manualWater");
  await supabaseClient.from("actions").insert({
    device_id: deviceSelect.value,
    action: "water",
    processed: false
  });
}

/* ================= GRAPH ================= */
async function loadCurve(deviceId) {
  console.log("📈 loadCurve(", deviceId, ")");
  status.textContent = "⏳ Chargement...";

  const { data } = await supabaseClient
    .from("mesures")
    .select("timestamp, humidity, threshold")
    .eq("device_id", deviceId)
    .order("timestamp");

  console.log("📈 mesures DATA :", data);

  if (!data?.length) {
    status.textContent = "Aucune donnée";
    return;
  }

  const h = data.map(m => ({ x: new Date(m.timestamp), y: m.humidity }));
  const t = data.map(m => ({ x: new Date(m.timestamp), y: m.threshold }));

  if (chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type: "line",
    data: {
      datasets: [
        { label: "Humidité (%)", data: h, borderColor: "#2c7" },
        { label: "Seuil (%)", data: t, borderColor: "red", pointRadius: 0 }
      ]
    },
    options: {
      parsing: false,
      scales: {
        x: { type: "time" },
        y: { min: 0, max: 100 }
      }
    }
  });

  status.textContent = `✅ ${data.length} points`;
}
</script>

</body>
</html>

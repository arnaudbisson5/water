<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Plant Curve</title>

<style>
  body { font-family: Arial; margin: 30px; }
  h1 { color: #2c7; }

  input, button, select {
    padding: 10px;
    font-size: 16px;
    margin-top: 10px;
    margin-right: 5px;
  }

  #loginBox {
    border: 2px solid #ccc;
    padding: 20px;
    max-width: 400px;
    border-radius: 10px;
    margin-bottom: 30px;
  }

  #dashboard { display: none; }
  #chartContainer { max-width: 900px; margin-top: 40px; }
  #status { margin-top: 20px; font-weight: bold; }
</style>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>
<body>

<h1>🌱 Courbe humidité + seuil + arrosages</h1>

<!-- ✅ LOGIN -->
<div id="loginBox">
  <h2>Connexion</h2>
  <p>Entrez votre email pour recevoir un lien magique :</p>

  <input id="emailInput" type="email" placeholder="email@example.com" style="width:90%">
  <br>
  <button onclick="login()">Se connecter</button>

  <p id="loginStatus"></p>
</div>

<!-- ✅ DASHBOARD -->
<div id="dashboard">

  <p><strong>Device ID :</strong></p>
  <input id="deviceIdInput" value="B483A21F8A3C">

  <br><br>
  <button onclick="loadCurve()">Afficher la courbe</button>
  <button onclick="sendWaterCommand()">💧 Arroser maintenant</button>
  <button onclick="logout()">🚪 Déconnexion</button>

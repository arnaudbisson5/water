<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>🌱 Jardin en Eau</title>

<style>
  body { font-family: Arial; margin: 30px; }
  h1 { color: #2c7; }
  input, select, button {
    padding: 8px;
    font-size: 16px;
    margin: 5px 5px 5px 0;
  }
  #loginBox {
    max-width: 400px;
    border: 2px solid #ccc;
    padding: 20px;
    border-radius: 10px;
  }
  #dashboard { display: none; }
  #status { margin-top: 15px; font-weight: bold; }
  #chartContainer { max-width: 900px; margin-top: 30px; }
</style>

<!-- ✅ Scripts correctement inclus -->
<script src="https://cdn.jsdelivrt.js
https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns
https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2</script>
</head>

<body>

<h1>🌱 Jardin en Eau</h1>

<!-- LOGIN -->
<div id="loginBox">
  <h2>Connexion</h2>
  <input id="emailInput" type="email" placeholder="email@example.com" style="width:90%">
  <br>
  <button id="loginBtn">Recevoir le lien de connexion</button>
  <p id="loginStatus"></p>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <p><strong>Module :</strong></p>
  <select id="deviceSelect"></select>

  <h3>⏱️ Échelle de temps</h3>
  <select id="timeScale">
    <option value="hour">Dernière heure</option>
    <option value="day" selected>Dernier jour</option>
    <option value="week">Dernière semaine</option>
    <option value="month">Dernier mois</option>
  </select>

  <div id="status"></div>

  <div id="chartContainer">
    <canvas id="chartCanvas"></canvas>
  </div>

  <br>
  <button id="logoutBtn">Déconnexion</button>
</div>

<script>
/* ================= SUPABASE ================= */
const SUPABASE_URL = "https://pbciwmsuhaniokugzqhr.supabase.co";
const SUPABASE_ANON_KEY = "TA_CLE_ANON_ICI";

const supabaseClient = supabase.createClient(
  SUPABASE_URL,
  SUPABASE_ANON_KEY
);

/* ================= STATE ================= */
let currentUser = null;
let chartInstance = null;
let allMesures = [];
const PAGE_SIZE = 1000;
const MAX_POINTS = 10000;

/* ================= AUTH ================= */
loginBtn.onclick = async () => {
  const email = emailInput.value.trim();
  if (!email) return;
  const { error } = await supabaseClient.auth.signInWithOtp({ email });
  loginStatus.textContent = error
    ? error.message
    : "✅ Email envoyé (Magic Link)";
};

logoutBtn.onclick = async () => {
  await supabaseClient.auth.signOut();
  location.reload();
};

supabaseClient.auth.onAuthStateChange((_event, session) => {
  if (session?.user && !currentUser) {
    onLogin(session.user);
  }
});

/* ================= INIT ================= */
async function init() {
  const { data: { session } } = await supabaseClient.auth.getSession();
  if (session?.user) {
    onLogin(session.user);
  }
}

/* ================= ON LOGIN ================= */
async function onLogin(user) {
  currentUser = user;
  loginBox.style.display = "none";
  dashboard.style.display = "block";
  await loadDevices();
}

/* ================= DEVICES ================= */
async function loadDevices() {
  const { data, error } = await supabaseClient
    .from("devices")
    .select("device_id, name")
    .eq("user_id", currentUser.id)
    .order("created_at");

  if (error || !data?.length) {
    status.textContent = "Aucun module";
    return;
  }

  deviceSelect.innerHTML = "";
  data.forEach(d => {
    const opt = document.createElement("option");
    opt.value = d.device_id;
    opt.textContent = d.name || d.device_id;
    deviceSelect.appendChild(opt);
  });

  deviceSelect.onchange = () => loadCurve(deviceSelect.value);
  loadCurve(data[0].device_id);
}

/* ================= LOAD CURVE (PAGINATION) ================= */
async function loadCurve(deviceId) {
  status.textContent = "⏳ Chargement...";
  allMesures = [];
  let from = 0;

  while (allMesures.length < MAX_POINTS) {
    const { data } = await supabaseClient
      .from("mesures")
      .select("timestamp, humidity, threshold")
      .eq("device_id", deviceId)
      .order("timestamp")
      .range(from, from + PAGE_SIZE - 1);

    if (!data || data.length === 0) break;

    allMesures.push(...data);
    if (data.length < PAGE_SIZE) break;
    from += PAGE_SIZE;
  }

  status.textContent = `✅ ${allMesures.length} points chargés`;
  drawChart();
}

/* ================= CHART ================= */
function drawChart() {
  const h = allMesures.map(m => ({ x: new Date(m.timestamp), y: m.humidity }));
  const t = allMesures.map(m => ({ x: new Date(m.timestamp), y: m.threshold }));

  if (chartInstance) chartInstance.destroy();

  const ctx = document.getElementById("chartCanvas").getContext("2d");

  chartInstance = new Chart(ctx, {
    type: "line",
    data: {
      datasets: [
        { label: "Humidité (%)", data: h, borderColor: "#2c7", tension: 0.2 },
        { label: "Seuil (%)", data: t, borderColor: "red", pointRadius: 0 }
      ]
    },
    options: {
      parsing: false,
      responsive: true,
      scales: {
        x: { type: "time" },
        y: { min: 0, max: 100 }
      }
    }
  });

  applyTimeScale();
}

/* ================= TIME SCALE ================= */
timeScale.onchange = applyTimeScale;

function applyTimeScale() {
  if (!chartInstance) return;

  const now = new Date();
  let start;
  switch (timeScale.value) {
    case "hour":  start = new Date(now - 3600000); break;
    case "day":   start = new Date(now - 86400000); break;
    case "week":  start = new Date(now - 7 * 86400000); break;
    case "month": start = new Date(now - 30 * 86400000); break;
  }

  chartInstance.options.scales.x.min = start;
  chartInstance.options.scales.x.max = now;
  chartInstance.update();
}

init();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Jardin en Eau</title>

  <style>
    body { font-family: Arial, sans-serif; margin: 30px; }
    h1, h2 { color: #2c7; }

    input, button, select {
      padding: 8px;
      font-size: 15px;
      margin: 6px 0;
    }

    #loginBox, #deviceBox {
      border: 1px solid #ccc;
      padding: 15px;
      border-radius: 6px;
      max-width: 420px;
      margin-bottom: 20px;
    }

    #dashboard { display: none; }
    .status { font-weight: bold; margin-top: 10px; }

    #debugBadge {
      background: #ffb347;
      color: #000;
      padding: 4px 8px;
      font-weight: bold;
      margin-bottom: 10px;
      display: none;
    }
  </style>

  <!-- ✅ Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>

  <!-- ✅ Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<h1>🌱 Jardin en Eau</h1>
<div id="debugBadge">MODE DEBUG – AUTH BYPASS</div>

<!-- ================= LOGIN ================= -->
<div id="loginBox">
  <h2>Connexion</h2>
  <p>Email (ignoré en mode debug)</p>
  <input id="emailInput" type="email" placeholder="email@example.com">
  <br>
  <button onclick="login()">Recevoir le lien de connexion</button>
  <p id="loginStatus" class="status"></p>
</div>

<!-- ================= DASHBOARD ================= -->
<div id="dashboard">

  <div id="deviceBox">
    <h2>Modules</h2>
    <select id="deviceSelect"></select>
  </div>

  <label><strong>Période :</strong></label><br>
  <select id="periodSelect">
    <option value="1h">Dernière heure</option>
    <option value="1d" selected>Dernier jour</option>
    <option value="7d">Dernière semaine</option>
    <option value="30d">Dernier mois</option>
  </select>

  <br><br>
  <button onclick="loadCurve()">Afficher la courbe</button>
  <button onclick="logout()">Déconnexion</button>

  <div id="status" class="status"></div>

  <div style="max-width:900px; margin-top:20px;">
    <canvas id="chart"></canvas>
  </div>
</div>

<script>
/* ================= MODE DEBUG ================= */
const DEBUG_MODE = true;   // ⬅️ false en production

if (DEBUG_MODE) {
  document.getElementById("debugBadge").style.display = "inline-block";
}

/* ================= SUPABASE ================= */
const SUPABASE_URL = "https://pbciwmsuhaniokugzqhr.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBiY2l3bXN1aGFuaW9rdWd6cWhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MjAwNjYsImV4cCI6MjA5MDE5NjA2Nn0.Fl1-yezxVeatTaIJlUvAKG1X9PhIlworqZ-6vxDyAmo";

const supabaseClient = supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

let chart = null;

/* ================= LOGIN ================= */
async function login() {

  /* ✅ MODE DEBUG : clic = accès direct */
  if (DEBUG_MODE) {
    console.warn("DEBUG: magic link ignoré, accès direct");
    showDashboard();
    return;
  }

  /* ✅ MODE NORMAL */
  const email = emailInput.value.trim();
  if (!email) return;

  loginStatus.textContent = "Envoi du lien...";

  const { error } =
    await supabaseClient.auth.signInWithOtp({ email });

  loginStatus.textContent = error
    ? "❌ " + error.message
    : "✅ Lien envoyé par email";
}

/* ================= UI ================= */
function showDashboard() {
  loginBox.style.display = "none";
  dashboard.style.display = "block";
  loadUserDevices().then(loadCurve);
}

function logout() {
  if (DEBUG_MODE) {
    location.reload();
    return;
  }
  supabaseClient.auth.signOut().then(() => location.reload());
}

/* ================= MODULES ================= */
async function loadUserDevices() {
  const { data } = await supabaseClient
    .from("devices")
    .select("device_uid");

  deviceSelect.innerHTML = "";
  data?.forEach(d => {
    const opt = document.createElement("option");
    opt.value = d.device_uid;
    opt.textContent = d.device_uid;
    deviceSelect.appendChild(opt);
  });
}

deviceSelect.addEventListener("change", loadCurve);
periodSelect.addEventListener("change", loadCurve);

/* ================= AXE TEMPOREL ================= */
function getTimeScale(period) {
  const now = new Date();

  if (period === "1h")
    return { min: new Date(now - 3600000), max: now, unit: "minute", display: "HH:mm" };

  if (period === "1d")
    return { min: new Date(now - 86400000), max: now, unit: "hour", display: "HH'h'" };

  if (period === "7d")
    return { min: new Date(now - 6 * 86400000), max: now, unit: "day", display: "EEE" };

  return { min: new Date(now - 29 * 86400000), max: now, unit: "day", display: "dd/MM" };
}

/* ================= COURBE ================= */
async function loadCurve() {
  const deviceId = deviceSelect.value;
  if (!deviceId) {
    status.textContent = "Aucun module sélectionné.";
    return;
  }

  const scale = getTimeScale(periodSelect.value);
  status.textContent = "Chargement...";

  const url =
    `${SUPABASE_URL}/rest/v1/mesures` +
    `?device_id=eq.${deviceId}` +
    `&timestamp=gte.${scale.min.toISOString()}` +
    `&order=timestamp.asc`;

  const res = await fetch(url, {
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: "Bearer " + SUPABASE_KEY
    }
  });

  const mesures = await res.json();

  const points = mesures.map(m => ({
    x: new Date(m.timestamp),
    y: m.humidity
  }));

  if (chart) chart.destroy();

  chart = new Chart(chart, {
    type: "line",
    data: {
      datasets: [{
        label: "Humidité (%)",
        data: points,
        borderColor: "#2c7",
        tension: 0.2,
        spanGaps: false
      }]
    },
    options: {
      responsive: true,
      scales: {
        x: {
          type: "time",
          min: scale.min,
          max: scale.max,
          time: {
            unit: scale.unit,
            displayFormats: {
              [scale.unit]: scale.display
            }
          }
        },
        y: { min: 0, max: 100 }
      }
    }
  });

  status.textContent =
    points.length ? "✅ Courbe affichée" : "⚠️ Aucune donnée sur la période";
}
</script>

</body>
</html>
``

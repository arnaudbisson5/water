<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Jardin en Eau</title>

  <style>
    body { font-family: Arial, sans-serif; margin: 30px; }
    h1, h2 { color: #2c7; }

    input, button, select {
      padding: 8px;
      font-size: 15px;
      margin: 6px 0;
    }

    #loginBox, #deviceBox {
      border: 1px solid #ccc;
      padding: 15px;
      border-radius: 6px;
      max-width: 420px;
      margin-bottom: 20px;
    }

    #dashboard { display: none; }
    .status { font-weight: bold; margin-top: 10px; }
  </style>

  <!-- ✅ Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>

  <!-- ✅ Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<h1>🌱 Jardin en Eau</h1>

<!-- ================= LOGIN ================= -->
<div id="loginBox">
  <h2>Connexion</h2>
  <input id="emailInput" type="email" placeholder="email@example.com">
  <br>
  <button onclick="login()">Recevoir le lien de connexion</button>
  <p id="loginStatus" class="status"></p>
</div>

<!-- ================= DASHBOARD ================= -->
<div id="dashboard">

  <div id="deviceBox">
    <h2>Modules</h2>
    <select id="deviceSelect"></select>
  </div>

  <label><strong>Période :</strong></label><br>
  <select id="periodSelect">
    <option value="1h">Dernière heure</option>
    <option value="1d" selected>Dernier jour</option>
    <option value="7d">Dernière semaine</option>
    <option value="30d">Dernier mois</option>
  </select>

  <br><br>
  <button onclick="loadCurve()">Afficher la courbe</button>
  <button onclick="logout()">Déconnexion</button>

  <div id="status" class="status"></div>

  <div style="max-width:900px;margin-top:20px;">
    <canvas id="chart"></canvas>
  </div>
</div>

<script>
/* ================= CONFIG ================= */
const SUPABASE_URL = "https://pbciwmsuhaniokugzqhr.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBiY2l3bXN1aGFuaW9rdWd6cWhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MjAwNjYsImV4cCI6MjA5MDE5NjA2Nn0.Fl1-yezxVeatTaIJlUvAKG1X9PhIlworqZ-6vxDyAmo";

const supabaseClient = supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

let chart = null;

/* ================= AUTH ================= */
async function updateUI() {
  const { data } = await supabaseClient.auth.getUser();

  loginBox.style.display = data?.user ? "none" : "block";
  dashboard.style.display = data?.user ? "block" : "none";

  if (data?.user) {
    await loadUserDevices();
    loadCurve();
  }
}

supabaseClient.auth.onAuthStateChange(updateUI);
updateUI();

/* ================= LOGIN ================= */
async function login() {
  const email = emailInput.value.trim();
  if (!email) return;

  loginStatus.textContent = "Envoi du lien...";

  try {
    const { error } =
      await supabaseClient.auth.signInWithOtp({ email });

    loginStatus.textContent = error
      ? "❌ " + error.message
      : "✅ Lien envoyé par email";
  } catch (e) {
    console.error(e);
    loginStatus.textContent = "❌ Erreur technique";
  }
}

async function logout() {
  await supabaseClient.auth.signOut();
  location.reload();
}

/* ================= MODULES ================= */
async function loadUserDevices() {
  const { data } = await supabaseClient
    .from("devices")
    .select("device_uid");

  deviceSelect.innerHTML = "";
  data?.forEach(d => {
    const o = document.createElement("option");
    o.value = d.device_uid;
    o.textContent = d.device_uid;
    deviceSelect.appendChild(o);
  });
}

deviceSelect.addEventListener("change", loadCurve);
periodSelect.addEventListener("change", loadCurve);

/* ================= AXE TEMPOREL ================= */
function getTimeScale(period) {
  const now = new Date();

  switch (period) {
    case "1h":
      return {
        min: new Date(now - 1 * 60 * 60 * 1000),
        max: now,
        unit: "minute",
        display: "HH:mm"
      };

    case "1d":
      return {
        min: new Date(now - 24 * 60 * 60 * 1000),
        max: now,
        unit: "hour",
        display: "HH'h'"
      };

    case "7d":
      return {
        min: new Date(now - 6 * 24 * 60 * 60 * 1000),
        max: now,
        unit: "day",
        display: "EEE"
      };

    case "30d":
      return {
        min: new Date(now - 29 * 24 * 60 * 60 * 1000),
        max: now,
        unit: "day",
        display: "dd/MM"
      };
  }
}

/* ================= COURBE ================= */
async function loadCurve() {
  const deviceId = deviceSelect.value;
  if (!deviceId) return;

  const scale = getTimeScale(periodSelect.value);
  status.textContent = "Chargement...";

  const url =
    `${SUPABASE_URL}/rest/v1/mesures` +
    `?device_id=eq.${deviceId}` +
    `&timestamp=gte.${scale.min.toISOString()}` +
    `&order=timestamp.asc`;

  const res = await fetch(url, {
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: "Bearer " + SUPABASE_KEY
    }
  });

  const mesures = await res.json();

  const points = mesures.map(m => ({
    x: new Date(m.timestamp),
    y: m.humidity
  }));

  if (chart) chart.destroy();

  chart = new Chart(chartCanvas, {
    type: "line",
    data: {
      datasets: [{
        label: "Humidité (%)",
        data: points,
        borderColor: "#2c7",
        tension: 0.2,
        spanGaps: false
      }]
    },
    options: {
      responsive: true,
      scales: {
        x: {
          type: "time",
          min: scale.min,
          max: scale.max,
          time: {
            unit: scale.unit,
            displayFormats: {
              [scale.unit]: scale.display
            },
            tooltipFormat: scale.display
          }
        },
        y: { min: 0, max: 100 }
      }
    }
  });

  status.textContent = points.length
    ? "✅ Courbe affichée"
    : "⚠️ Aucune donnée sur cette période";
}
</script>

</body>
</html>

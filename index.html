<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Configuration du module</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <h2>Configurer votre module</h2>
  <input id="email" type="email" placeholder="email@example.com">
  <button onclick="login()">Recevoir le lien</button>
  <p id="status"></p>

<script>
const SUPABASE_URL = "https://pbciwmsuhaniokugzqhr.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBiY2l3bXN1aGFuaW9rdWd6cWhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MjAwNjYsImV4cCI6MjA5MDE5NjA2Nn0.Fl1-yezxVeatTaIJlUvAKG1X9PhIlworqZ-6vxDyAmo";
const DEVICE_ID = "ESP32_DEVICE_ID";
const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function login() {
  const email = document.getElementById("email").value;
  if (!email) return;
  await supabase.auth.signInWithOtp({
    email,
    options: { emailRedirectTo: window.location.href }
  });
}

supabase.auth.onAuthStateChange(async (event, session) => {
  if (event === "SIGNED_IN") {
    await supabase.from("devices").insert({
      device_id: DEVICE_ID,
      user_id: session.user.id,
      name: "Mon module",
      claimed: true
    });
    document.getElementById("status").innerText = "Module associé.";
  }
});
</script>
</body>
</html>

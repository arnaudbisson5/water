<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<title>Plant Curve</title>

<style>
  body { font-family: Arial; margin: 30px; }
  h1 { color: #2c7; }
  input, button, select {
    padding: 10px;
    font-size: 16px;
    margin-top: 10px;
    margin-right: 5px;
  }
  #chartContainer {
    width: 100%;
    max-width: 900px;
    margin-top: 40px;
  }
  #status {
    margin-top: 20px;
    font-weight: bold;
  }
</style>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
</head>

<body>

<h1>🌱 Courbe humidité + seuil + arrosages</h1>

<p><strong>Device ID :</strong></p>
<input id="deviceIdInput" value="B483A21F8A3C" size="20">

<br>

<button onclick="loadCurve()">Afficher la courbe</button>
<button onclick="sendWaterCommand()" style="background:#4CAF50;color:white;">
  💧 Arroser maintenant
</button>
<button onclick="deleteEverything()" style="background:#b71c1c;color:white;">
  🗑️ Effacer toutes les données
</button>

<h2>⚙️ Envoyer un seuil (%)</h2>
<input id="thresholdInput" value="50" size="6">
<button onclick="sendThreshold()" style="background:#2196F3;color:white;">
  ✅ Enregistrer seuil
</button>

<h2>⏱️ Échelle de temps</h2>
<select id="timeScale" onchange="applyTimeScale()">
  <option value="hour">Dernière heure</option>
  <option value="day" selected>Dernier jour</option>
  <option value="week">Dernière semaine</option>
  <option value="month">Dernier mois</option>
</select>

<div id="status"></div>

<div id="chartContainer" style="display:none;">
  <canvas id="chart"></canvas>
</div>

<script>
// --------------------------------------------------
// CONFIG
// --------------------------------------------------
const SUPABASE_URL = "https://pbciwmsuhaniokugzqhr.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBiY2l3bXN1aGFuaW9rdWd6cWhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MjAwNjYsImV4cCI6MjA5MDE5NjA2Nn0.Fl1-yezxVeatTaIJlUvAKG1X9PhIlworqZ-6vxDyAmo";

let chart = null;

// --------------------------------------------------
// CHARGER LA COURBE
// --------------------------------------------------
async function loadCurve() {
  const deviceId = document.getElementById("deviceIdInput").value.trim();
  const status = document.getElementById("status");
  const container = document.getElementById("chartContainer");

  status.textContent = "⏳ Chargement...";

  const mesures = await fetch(
    `${SUPABASE_URL}/rest/v1/mesures?device_id=eq.${deviceId}&order=timestamp.asc`,
    {
      headers: {
        apikey: SUPABASE_KEY,
        Authorization: "Bearer " + SUPABASE_KEY
      }
    }
  ).then(r => r.json());

  if (!mesures.length) {
    status.textContent = "Aucune mesure.";
    container.style.display = "none";
    return;
  }

  const cleaned = mesures.filter(m =>
    m.timestamp &&
    typeof m.humidity === "number" &&
    typeof m.threshold === "number"
  );

  const humidityPoints = cleaned.map(m => ({
    x: new Date(m.timestamp),
    y: m.humidity
  }));

  const thresholdPoints = cleaned.map(m => ({
    x: new Date(m.timestamp),
    y: m.threshold
  }));

  const actions = await fetch(
    `${SUPABASE_URL}/rest/v1/actions?device_id=eq.${deviceId}&order=timestamp.asc`,
    {
      headers: {
        apikey: SUPABASE_KEY,
        Authorization: "Bearer " + SUPABASE_KEY
      }
    }
  ).then(r => r.json());

  function findClosestHumidity(date) {
    let best = cleaned[0];
    let dt = Math.abs(new Date(best.timestamp) - date);
    for (let m of cleaned) {
      let nd = Math.abs(new Date(m.timestamp) - date);
      if (nd < dt) {
        best = m;
        dt = nd;
      }
    }
    return best.humidity;
  }

  const waterRequests = actions
    .filter(a => a.action === "water" && !a.processed)
    .map(a => ({
      x: new Date(a.timestamp),
      y: findClosestHumidity(new Date(a.timestamp))
    }));

  const waterDone = actions
    .filter(a => a.action === "water" && a.processed)
    .map(a => ({
      x: new Date(a.timestamp),
      y: findClosestHumidity(new Date(a.timestamp))
    }));

  if (chart) chart.destroy();
  container.style.display = "block";

  chart = new Chart(document.getElementById("chart"), {
    type: "line",
    data: {
      datasets: [
        {
          label: "Humidité (%)",
          data: humidityPoints,
          borderColor: "#2c7",
          backgroundColor: "rgba(44,200,100,0.15)",
          borderWidth: 2,
          tension: 0.2
        },
        {
          label: "Seuil (%)",
          data: thresholdPoints,
          borderColor: "red",
          borderWidth: 2,
          pointRadius: 0
        },
        {
          label: "Demande arrosage",
          type: "scatter",
          data: waterRequests,
          pointBackgroundColor: "orange",
          pointRadius: 8
        },
        {
          label: "Arrosage exécuté",
          type: "scatter",
          data: waterDone,
          pointBackgroundColor: "green",
          pointRadius: 8
        }
      ]
    },
    options: {
      parsing: false,
      responsive: true,
      scales: {
        x: {
          type: "time",
          title: { display: true, text: "Date / Heure locale" }
        },
        y: {
          min: 0,
          max: 100,
          title: { display: true, text: "Humidité (%)" }
        }
      }
    }
  });

  status.textContent = "✅ Courbe prête";
  applyTimeScale();
}

// --------------------------------------------------
// ÉCHELLE STRICTE X : now - période -> now
// --------------------------------------------------
function applyTimeScale() {
  if (!chart) return;

  const scale = document.getElementById("timeScale").value;
  const now = new Date();
  let start;

  if (scale === "hour") {
    start = new Date(now.getTime() - 60 * 60 * 1000);
  }

  if (scale === "day") {
    start = new Date(now.getTime() - 24 * 60 * 60 * 1000);
  }

  if (scale === "week") {
    // ✅ début du jour (00:00) il y a 6 jours
    start = new Date(now);
    start.setHours(0, 0, 0, 0);
    start.setDate(start.getDate() - 6);
  }

  if (scale === "month") {
    start = new Date(now.getTime() - 30 * 24 * 60 * 60 * 1000);
  }

  chart.options.scales.x.min = start;
  chart.options.scales.x.max = now;
  chart.update("none");
}

// --------------------------------------------------
// COMMANDES
// --------------------------------------------------
async function sendWaterCommand() {
  const deviceId = document.getElementById("deviceIdInput").value.trim();
  await fetch(`${SUPABASE_URL}/rest/v1/actions`, {
    method: "POST",
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: "Bearer " + SUPABASE_KEY,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      device_id: deviceId,
      action: "water",
      processed: false,
      timestamp: new Date().toISOString()
    })
  });
  loadCurve();
}

async function sendThreshold() {
  const deviceId = document.getElementById("deviceIdInput").value.trim();
  const threshold = parseFloat(document.getElementById("thresholdInput").value.trim());
  await fetch(`${SUPABASE_URL}/rest/v1/actions`, {
    method: "POST",
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: "Bearer " + SUPABASE_KEY,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      device_id: deviceId,
      action: "set_threshold",
      threshold,
      processed: false,
      timestamp: new Date().toISOString()
    })
  });
  loadCurve();
}

async function deleteEverything() {
  const deviceId = document.getElementById("deviceIdInput").value.trim();
  if (!confirm("Effacer toutes les données ?")) return;

  await fetch(`${SUPABASE_URL}/rest/v1/mesures?device_id=eq.${deviceId}`, {
    method: "DELETE",
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: "Bearer " + SUPABASE_KEY
    }
  });

  await fetch(`${SUPABASE_URL}/rest/v1/actions?device_id=eq.${deviceId}`, {
    method: "DELETE",
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: "Bearer " + SUPABASE_KEY
    }
  });

  loadCurve();
}
</script>

</body>
</html>

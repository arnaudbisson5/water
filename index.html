<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<title>Jardin en Eau ed05</title>

<style>
  body { font-family: Arial; margin: 30px; }
  h1 { color: #2c7; }
  input, button, select {
    padding: 10px;
    font-size: 16px;
    margin-top: 10px;
    margin-right: 5px;
  }
  #chartContainer {
    width: 100%;
    max-width: 900px;
    margin-top: 40px;
    display: none;
  }
  #status {
    margin-top: 20px;
    font-weight: bold;
  }
</style>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<h1>🌱 Monitoring</h1>

<!-- LOGIN -->
<div id="loginBox">
  <input id="emailInput" type="email" placeholder="email@gmail.com" />
  <br>
  <button onclick="login()">Recevoir le lien de connexion</button>
</div>

<!-- APP -->
<div id="appBox" style="display:none;">
  <h2>Module</h2>
  <select id="deviceSelect" onchange="loadCurve()"></select>

  <div id="status"></div>

  <div id="chartContainer">
    <canvas id="chart"></canvas>
  </div>

  <br>
  <button onclick="logout()">Déconnexion</button>
</div>

<script>
// --------------------------------------------------
// CONFIG
// --------------------------------------------------
const SUPABASE_URL = "https://arnaudbisson5.github.io/water/";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBiY2l3bXN1aGFuaW9rdWd6cWhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MjAwNjYsImV4cCI6MjA5MDE5NjA2Nn0.Fl1-yezxVeatTaIJlUvAKG1X9PhIlworqZ-6vxDyAmo";

const supabase = window.supabase.createClient(
  SUPABASE_URL,
  SUPABASE_ANON_KEY
);

let chart = null;

// --------------------------------------------------
// AUTH
// --------------------------------------------------
async function login() {
  try {
    const email = document.getElementById("emailInput").value.trim();
    if (!email) {
      alert("Veuillez entrer un email");
      return;
    }

    console.log("Tentative magic link pour :", email);

    const { data, error } = await supabase.auth.signInWithOtp({
      email: email
    });

    if (error) {
      console.error(error);
      alert("Erreur Supabase : " + error.message);
      return;
    }

    alert("✅ Email envoyé. Vérifie ta boîte mail.");

  } catch (e) {
    console.error("Erreur JS :", e);
    alert("Erreur JS – voir console");
  }
}

async function logout() {
  await supabase.auth.signOut();
  location.reload();
}

supabase.auth.onAuthStateChange((event, session) => {
  if (event === "SIGNED_IN") initApp();
});

// --------------------------------------------------
// INIT APP
// --------------------------------------------------
async function initApp() {
  loginBox.style.display = "none";
  appBox.style.display = "block";
  await loadDevices();
}

// --------------------------------------------------
// LOAD DEVICES (selon user_id connecté)
// --------------------------------------------------
async function loadDevices() {
  const { data, error } = await supabase
    .from("devices")
    .select("device_uid, name")
    .order("created_at");

  if (error || !data.length) {
    status.textContent = "Aucun module";
    return;
  }

  const select = document.getElementById("deviceSelect");
  select.innerHTML = "";

  data.forEach(d => {
    const o = document.createElement("option");
    o.value = d.device_uid;
    o.textContent = d.name || d.device_uid;
    select.appendChild(o);
  });

  loadCurve();
}

// --------------------------------------------------
// LOAD CURVE (module sélectionné)
// --------------------------------------------------
async function loadCurve() {
  const deviceId = deviceSelect.value;
  if (!deviceId) return;

  status.textContent = "Chargement...";
  chartContainer.style.display = "block";

  const { data, error } = await supabase
    .from("mesures")
    .select("timestamp, humidity, threshold")
    .eq("device_uid", deviceId)
    .order("timestamp");

  if (error || !data.length) {
    status.textContent = "Aucune donnée";
    return;
  }

  const humidity = data.map(m => ({
    x: new Date(m.timestamp),
    y: m.humidity
  }));

  const threshold = data.map(m => ({
    x: new Date(m.timestamp),
    y: m.threshold
  }));

  if (chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type: "line",
    data: {
      datasets: [
        {
          label: "Humidité (%)",
          data: humidity,
          borderColor: "#2c7",
          tension: 0.2
        },
        {
          label: "Seuil (%)",
          data: threshold,
          borderColor: "red",
          pointRadius: 0
        }
      ]
    },
    options: {
      parsing: false,
      responsive: true,
      scales: {
        x: { type: "time" },
        y: { min: 0, max: 100 }
      }
    }
  });

  status.textContent = "✅ Courbe affichée";
}
</script>

</body>
</html>
